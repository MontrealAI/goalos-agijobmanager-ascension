          <!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Architecture · GoalOS AGIJobManager</title><meta name="theme-color" content="#061522"><link rel="stylesheet" href="assets/atelier.css"></head><body><canvas id="field"></canvas><div class="topline">Architecture dossier · contract vs repository · proof vs power</div><header><div class="nav"><a class="brand" href="index.html"><span class="sigil"></span><span><b>GoalOS</b><span>Architecture</span></span></a><nav class="links"><a href="index.html">Ascension</a><a href="operator-console.html">Console</a><a href="evidence/">Evidence</a><a class="active" href="architecture.html">Architecture</a><a href="verification.html">Verification</a></nav></div></header><main><section class="hero"><div class="wrap grid2"><div><div class="eyebrow">Trusted architecture</div><h1 class="title">One contract. <span class="g">Three public surfaces.</span></h1><p class="lead">AGIJobManager is the on-chain settlement machine. This repository is the public evidence institution. The legacy console remains the expert cockpit. The separation is the trust architecture.</p></div><div class="stage"><div class="consoleTop"><span>Separation of powers</span><span class="pill">human-gated</span></div><div class="matrix"><div class="cell"><h4>Contract</h4><p>Settlement logic and Ethereum state.</p></div><div class="cell"><h4>Ascension repo</h4><p>Public proof room and product front door.</p></div><div class="cell"><h4>Evidence Docket</h4><p>Claims, non-claims, proof, verification, risk.</p></div><div class="cell"><h4>Expert console</h4><p>Advanced operator cockpit, not the public default.</p></div></div></div></div></section><section class="section paper"><div class="wrap"><h2 class="sectionTitle">Architecture map</h2><div class="grid3"><div class="tile"><h3>On-chain machine</h3><p>AGIJobManager at the canonical Ethereum Mainnet address is the settlement rail for escrowed job lifecycle actions.</p></div><div class="tile"><h3>Public institution</h3><p>This GitHub Pages repository explains the machine, exposes evidence, and provides read-only planning objects.</p></div><div class="tile"><h3>Human authority</h3><p>Any live wallet, approval, or Mainnet write remains outside this public site and requires expert human review.</p></div></div></div></section><section class="section"><div class="wrap"><h2 class="sectionTitle">Governance invariant</h2><p class="quote">No proof, no settlement. No eval, no propagation. No rollback, no release. No wallet authority from a public proof page.</p></div></section></main><footer class="footer"><div class="wrap">Architecture dossier · GoalOS AGIJobManager Ascension</div></footer><script src="assets/atelier.js"></script></body></html>
