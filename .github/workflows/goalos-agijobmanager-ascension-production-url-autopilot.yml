name: GoalOS AGIJobManager Ascension Production URL Autopilot

on:
  workflow_dispatch:
    inputs:
      deploy_pages:
        description: "Deploy the canonical production URL after generation and verification"
        required: true
        default: true
        type: boolean
      commit_generated_source:
        description: "Commit generated repository source back to main"
        required: true
        default: true
        type: boolean
      regenerate_repository:
        description: "Regenerate repository files from the embedded canonical kit"
        required: true
        default: true
        type: boolean
  push:
    branches: [ main ]
    paths:
      - 'site/**'
      - 'data/**'
      - 'docs/**'
      - 'schemas/**'
      - 'src/**'
      - 'tools/**'
      - 'tests/**'
      - 'package.json'
      - '.github/workflows/goalos-agijobmanager-ascension-production-url-autopilot.yml'
      - '.github/workflows/pages.yml'

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: goalos-agijobmanager-production-url
  cancel-in-progress: false

env:
  CANONICAL_REPOSITORY: MontrealAI/goalos-agijobmanager-ascension
  PUBLIC_REPOSITORY_URL: https://github.com/MontrealAI/goalos-agijobmanager-ascension
  PUBLIC_BASE_URL: https://montrealai.github.io/goalos-agijobmanager-ascension/
  PRODUCTION_URL: https://montrealai.github.io/goalos-agijobmanager-ascension/
  ENFORCE_CANONICAL_URL: 'true'

jobs:
  generate-verify-deploy:
    name: Generate, verify, and publish https://montrealai.github.io/goalos-agijobmanager-ascension/
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Guard canonical repository
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.repository }}" != "$CANONICAL_REPOSITORY" ]; then
            echo "This production workflow is locked to $CANONICAL_REPOSITORY" >&2
            echo "Current repository: ${{ github.repository }}" >&2
            exit 1
          fi
      - name: Materialize canonical source when requested or missing
        shell: bash
        run: |
          set -euo pipefail
          SHOULD_REGENERATE="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.regenerate_repository }}" = "true" ]; then SHOULD_REGENERATE="true"; fi
          if [ ! -f package.json ] || [ ! -d site ] || [ ! -d tools ]; then SHOULD_REGENERATE="true"; fi
          if [ "$SHOULD_REGENERATE" = "true" ]; then
            echo "Materializing canonical GoalOS AGIJobManager Ascension source."
            cat > /tmp/goalos-agijobmanager-canonical-source.tgz.b64 <<'B64'
