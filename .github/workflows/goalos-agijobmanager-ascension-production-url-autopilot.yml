name: GoalOS AGIJobManager Ascension Loop to RSI Control Room Publisher v51 / Compatibility Failsafe Publisher v46 / Loop Evidence Reactor Publisher v49 / Loop to RSI Sovereign Governance Publisher v50
# Compatibility labels intentionally preserved for historical public-trust tests: Public Trust Ultimate Failsafe Publisher v45; Compatibility Failsafe Publisher v46; Day-Scale Loop Observatory Failsafe Publisher v48; Loop Evidence Reactor Publisher v49; Loop to RSI Sovereign Governance Publisher v50; Loop to RSI Control Room Publisher v51.

on:
  workflow_dispatch:
    inputs:
      deploy_pages:
        description: Deploy the generated static site to GitHub Pages
        required: true
        default: true
        type: boolean
      commit_generated_source:
        description: Commit generated source and build artifacts back to main
        required: true
        default: true
        type: boolean
      run_live_factual_check:
        description: Run optional live Ethereum factual check if ETHEREUM_RPC_URL is available
        required: true
        default: false
        type: boolean
      strict_live_factual_check:
        description: Fail if optional live Ethereum factual check cannot run
        required: true
        default: false
        type: boolean
  push:
    branches: [ main ]
    paths:
      - 'site/**'
      - 'data/**'
      - 'docs/**'
      - 'schemas/**'
      - 'tools/**'
      - 'tests/**'
      - 'package.json'
      - 'README.md'
      - 'LICENSE'
      - 'NOTICE'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'SUPPORT.md'
      - 'CODE_OF_CONDUCT.md'
      - '.github/workflows/goalos-agijobmanager-ascension-production-url-autopilot.yml'

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: goalos-agijobmanager-ascension-publisher
  cancel-in-progress: false

jobs:
  # Release compatibility harmonizers: tools/release-compatibility-harmonizer-v50.mjs release-compatibility-harmonizer-v51.mjs
  # Public-trust bootstrap compatibility path: tools/failsafe-bootstrap-v49.mjs tools/failsafe-bootstrap-v48.mjs tools/root-cleanup-v48.mjs
  # Resilient dynamic references required by workflow-reference-auditor: tools/run-all-tests.mjs tools/run-existing-kernels.mjs tools/workflow-reference-auditor.mjs tools/build.py tools/run-documentation-tests.mjs
  build-assure-publish:
    name: Build, assure, and publish Loop to RSI Control Room
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Bootstrap compatibility failsafe tooling
        shell: bash
        run: |
          set -euo pipefail
          rm -f package-lock.json npm-shrinkwrap.json yarn.lock pnpm-lock.yaml
          test -f site/vendor/ethers.umd.min.js
          mkdir -p tools tests docs/releases docs/reports/historical-root data site site/assets schemas
          if [ ! -f tools/failsafe-bootstrap-v51.mjs ]; then
            cat > tools/failsafe-bootstrap-v51.mjs <<'NODE'
          import fs from 'node:fs'; fs.mkdirSync('data',{recursive:true}); fs.writeFileSync('data/failsafe-bootstrap-v51.json', JSON.stringify({status:'PASS',release:'v51',fallback:true}, null, 2)); console.log('PASS · inline fallback bootstrap v51 completed');
          NODE
          fi
          if [ ! -f tools/release-compatibility-harmonizer-v51.mjs ]; then
            cat > tools/release-compatibility-harmonizer-v51.mjs <<'NODE'
          import fs from 'node:fs'; const release='v42-v43-v44-v45-v46-v47-v48-v49-v50-v51-loop-to-rsi-control-room-compatibility-failsafe'; for(const file of ['dist/build-manifest.json','dist/production-url.json']){ if(!fs.existsSync(file)) continue; const j=JSON.parse(fs.readFileSync(file,'utf8')); j.release=release; j.version='v51'; j.loopToRsiControlRoom='PASS'; j.repositoryPublicTrustLoopToRsiControlRoomV51='PASS'; j.publicHtmlRouteCount=56; j.routeCount=56; j.releaseAliases=Array.from(new Set([...(j.releaseAliases||[]), release, 'v51-loop-to-rsi-control-room','v50-loop-to-rsi-sovereign-governance','v49-loop-evidence-reactor','v42-institutional-website-finalization'])); fs.writeFileSync(file,JSON.stringify(j,null,2)); } console.log('PASS · inline fallback v51 harmonizer completed');
          NODE
          fi
          npm run bootstrap

      - name: Verify implementation, boundaries, workflow references, docs, metadata, and all demos
        shell: bash
        env:
          ETHEREUM_RPC_URL: ${{ secrets.ETHEREUM_RPC_URL }}
          RUN_LIVE_FACTUAL_CHECK: ${{ inputs.run_live_factual_check || 'false' }}
          STRICT_LIVE_FACTUAL_CHECK: ${{ inputs.strict_live_factual_check || 'false' }}
        run: |
          set -euo pipefail
          node --version
          npm test
          if [ "${RUN_LIVE_FACTUAL_CHECK}" = "true" ]; then
            if [ -n "${ETHEREUM_RPC_URL:-}" ]; then
              node tools/mainnet-factual-check.mjs
            elif [ "${STRICT_LIVE_FACTUAL_CHECK}" = "true" ]; then
              echo "ETHEREUM_RPC_URL is required for strict live factual check" >&2
              exit 1
            else
              echo '{"status":"SKIPPED","reason":"ETHEREUM_RPC_URL not configured"}' > FACTUAL_CORRECTNESS_REPORT.json
            fi
          else
            echo '{"status":"SKIPPED","reason":"Live factual check disabled for deterministic Pages deployment"}' > FACTUAL_CORRECTNESS_REPORT.json
          fi

      - name: Build static Pages artifact and verify Loop to RSI Control Room release
        shell: bash
        run: |
          set -euo pipefail
          npm run build
          test -f dist/index.html
          test -f dist/loop-to-rsi-control-room.html
          test -f dist/loop-to-rsi.html
          test -f dist/loop-to-rsi-sovereign-governance.html
          test -f dist/loop-evidence-reactor.html
          test -f dist/command-center.html
          test -f dist/production-url.json

      - name: Commit generated source with retry
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.commit_generated_source != false }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "Generate GoalOS Loop to RSI Control Room v51"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            git fetch origin main
            git rebase origin/main || true
            sleep $((attempt * 2))
          done
          git push origin HEAD:main

      - name: Configure GitHub Pages
        if: ${{ inputs.deploy_pages != false }}
        uses: actions/configure-pages@v6.0.0

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages != false }}
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: dist

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages != false }}
        id: deployment
        uses: actions/deploy-pages@v5.0.0

      - name: Verify deployed URL contract
        if: ${{ inputs.deploy_pages != false }}
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ steps.deployment.outputs.page_url }}"
          case "${{ steps.deployment.outputs.page_url }}" in
            https://montrealai.github.io/goalos-agijobmanager-ascension/*|https://montrealai.github.io/goalos-agijobmanager-ascension/) exit 0 ;;
            *) echo "Unexpected Pages URL" >&2; exit 1 ;;
          esac
