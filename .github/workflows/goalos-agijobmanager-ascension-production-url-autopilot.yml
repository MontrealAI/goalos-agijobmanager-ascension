      - name: Generate cinematic interaction layer
        shell: bash
        run: |
          set -euo pipefail
          cat > site/assets/atelier.js <<'JS'
          const $=(q,ctx=document)=>ctx.querySelector(q);const $$=(q,ctx=document)=>[...ctx.querySelectorAll(q)];
          function canvasField(){const c=$('#field');if(!c)return;const x=c.getContext('2d');let w,h,dpr,pts=[];function reset(){dpr=Math.min(devicePixelRatio||1,2);w=c.width=innerWidth*dpr;h=c.height=innerHeight*dpr;c.style.width=innerWidth+'px';c.style.height=innerHeight+'px';pts=Array.from({length:Math.min(120,Math.floor(innerWidth/12))},()=>({x:Math.random()*w,y:Math.random()*h,r:(Math.random()*2+0.6)*dpr,v:(Math.random()*0.22+0.06)*dpr,a:Math.random()*6.28}))}function tick(){x.clearRect(0,0,w,h);for(const p of pts){p.y-=p.v;p.x+=Math.sin(p.a+=.006)*.12*dpr;if(p.y<-10){p.y=h+10;p.x=Math.random()*w}const g=x.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*6);g.addColorStop(0,'rgba(79,243,255,.55)');g.addColorStop(1,'rgba(255,255,255,0)');x.fillStyle=g;x.beginPath();x.arc(p.x,p.y,p.r*6,0,7);x.fill()}requestAnimationFrame(tick)}reset();addEventListener('resize',reset,{passive:true});tick()}
          function counters(){const io=new IntersectionObserver(es=>{for(const e of es){if(!e.isIntersecting)continue;const el=e.target;const target=Number(el.dataset.count||el.textContent.replace(/\D/g,''));let n=0;const step=Math.max(1,Math.ceil(target/38));const t=setInterval(()=>{n+=step;if(n>=target){n=target;clearInterval(t)}el.textContent=target===100?n+'%':n},22);io.unobserve(el)}},{threshold:.4});$$('[data-count]').forEach(el=>io.observe(el))}
          function tilt(){for(const card of $$('.stage,.tile')){card.addEventListener('pointermove',e=>{const r=card.getBoundingClientRect(),x=(e.clientX-r.left)/r.width-.5,y=(e.clientY-r.top)/r.height-.5;card.style.transform=`perspective(900px) rotateX(${-y*3}deg) rotateY(${x*3}deg)`});card.addEventListener('pointerleave',()=>card.style.transform='')}}
          function intent(){const f=$('#intentForm');if(!f)return;const out=$('#intentOut');f.addEventListener('submit',e=>{e.preventDefault();const data={schema:'goalos.agijobmanager.intent.v2',chainId:1,contract:'0xB3AAeb69b630f0299791679c063d68d6687481d1',token:'0xa61a3b3a130a9c20768eebf97e21515a6046a1fa',action:$('#action').value,role:$('#role').value,mission:$('#mission').value.trim(),evidenceBoundary:'public-safe hashes and manifests only',claimBoundary:'Unsigned planning artifact. No wallet connection, no token approval, no network switch, no transaction broadcast, no fund authorization.',createdAt:new Date().toISOString()};out.textContent=JSON.stringify(data,null,2);$('#downloadIntent').href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(data,null,2));$('#downloadIntent').download='goalos-agijobmanager-unsigned-intent.json'});$('#copyIntent')?.addEventListener('click',async()=>{await navigator.clipboard.writeText(out.textContent||'Generate an intent first.');$('#copyIntent').textContent='Copied'})}
          function docket(){const btn=$('#downloadDocket');if(!btn)return;const payload={schema:'goalos.evidence_docket.6_1.public',subject:'AGIJobManager Ascension',canonical:{repository:'MontrealAI/goalos-agijobmanager-ascension',url:'https://montrealai.github.io/goalos-agijobmanager-ascension/',contract:'0xB3AAeb69b630f0299791679c063d68d6687481d1',token:'0xa61a3b3a130a9c20768eebf97e21515a6046a1fa'},claims:['public evidence room','read-only operator console','verification manifest','claim boundaries'],nonClaims:['external audit completion','production fund authorization','wallet execution','Mainnet transaction broadcast'],safety:{walletAutoConnect:false,tokenApproval:false,transactionBroadcast:false,privateKeys:false}};btn.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(payload,null,2));btn.download='goalos-agijobmanager-evidence-docket-6-1.json'}
          function tabs(){for(const tab of $$('[data-tab]'))tab.addEventListener('click',()=>{const name=tab.dataset.tab;$$('[data-tab]').forEach(t=>t.classList.toggle('active',t===tab));$$('[data-panel]').forEach(p=>p.hidden=p.dataset.panel!==name)})}
          document.addEventListener('DOMContentLoaded',()=>{canvasField();counters();tilt();intent();docket();tabs()});
          JS

      - name: Generate flagship homepage
        shell: bash
        run: |
          set -euo pipefail
          cat > site/index.html <<'HTML'
          <!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GoalOS AGIJobManager Ascension</title><meta name="description" content="GoalOS-native institutional evidence room and read-only operator console for AGIJobManager Ascension."><meta property="og:title" content="GoalOS AGIJobManager Ascension"><meta property="og:description" content="Settlement-grade proof room for verified machine-labor work."><meta name="theme-color" content="#061522"><link rel="stylesheet" href="assets/atelier.css"></head><body><canvas id="field"></canvas><div class="topline">GoalOS AGIJobManager Ascension · Settlement-grade public proof · Human-gated</div><header><div class="nav"><a class="brand" href="index.html"><span class="sigil"></span><span><b>GoalOS</b><span>AGIJobManager</span></span></a><nav class="links"><a class="active" href="index.html">Ascension</a><a href="operator-console.html">Console</a><a href="evidence/">Evidence</a><a href="architecture.html">Architecture</a><a href="verification.html">Verification</a></nav></div></header><main><section class="hero"><div class="wrap heroGrid"><div><div class="eyebrow">Ethereum Mainnet · official AGIALPHA · proof-settlement rail</div><h1 class="title">AGIJobManager <span class="g">Ascension</span></h1><p class="subtitle">A settlement machine becomes an institutional proof room.</p><p class="lead">A cinematic, public-safe GoalOS front door for the AGIJobManager contract: canonical identities, Evidence Docket 6.1, read-only operator intent, verification manifests, and human authority boundaries—without wallet execution or Mainnet writes.</p><div class="actions"><a class="btn primary" href="operator-console.html">Open the settlement chamber →</a><a class="btn dark" href="evidence/">Inspect Evidence Docket</a><a class="btn dark" href="architecture.html">Read architecture</a></div><div class="boundary"><b>DEFAULT DENY.</b> No wallet auto-connect. No token approval. No network switch. No transaction broadcast. No private keys. No fund authorization.</div></div><aside class="stage" aria-label="Ascension theatre"><div class="consoleTop"><span>Constitutional settlement console</span><span class="pill">proof-to-settlement</span></div><div class="core"><strong>GoalOS<br>AGI Jobs<br>αJ</strong><div class="node n1">Mission</div><div class="node n2">Proof</div><div class="node n3">Settle</div><div class="node n4">Chronicle</div><div class="node n5">Human</div></div><div class="metrics"><div class="metric"><b data-count="10">0</b><span>Lifecycle actions</span></div><div class="metric"><b data-count="6">0</b><span>Proof gates</span></div><div class="metric"><b data-count="2">0</b><span>Canonical addresses</span></div><div class="metric"><b data-count="0">0</b><span>External actions</span></div></div></aside></div></section><section class="section paper"><div class="wrap grid2"><div><div class="eyebrow">Institutional product posture</div><h2 class="sectionTitle">From contract address to <span class="g">trusted public institution.</span></h2><p class="lead">The contract is the on-chain settlement machine. This repository is the public mission control: it explains, verifies, packages, and governs how humans should inspect the machine before any real authority is granted.</p></div><div class="tile"><span class="seal">CANONICAL IDENTITIES</span><p class="mono"><b>AGIJobManager</b><br>0xB3AAeb69b630f0299791679c063d68d6687481d1</p><p class="mono"><b>AGIALPHA</b><br>0xa61a3b3a130a9c20768eebf97e21515a6046a1fa</p><p class="mono"><b>Production URL</b><br>https://montrealai.github.io/goalos-agijobmanager-ascension/</p></div></div></section><section class="section"><div class="wrap"><div class="eyebrow">Proof civilization for machine work</div><h2 class="sectionTitle">Request → Escrow → Execute → Proof → Validate → Settle → Chronicle.</h2><p class="lead">The public website turns that lifecycle into a non-technical inspection surface: mission, contract identity, public proof boundary, evaluator posture, risk ledger, and rollback discipline.</p><div class="rail"><div class="gate"><b>01</b><span>Commit</span></div><div class="gate"><b>02</b><span>Preflight</span></div><div class="gate"><b>03</b><span>Prove</span></div><div class="gate"><b>04</b><span>Evaluate</span></div><div class="gate"><b>05</b><span>Select</span></div><div class="gate"><b>06</b><span>Human review</span></div><div class="gate"><b>07</b><span>Simulate</span></div><div class="gate"><b>08</b><span>Authorize</span></div><div class="gate"><b>09</b><span>Settle</span></div><div class="gate"><b>10</b><span>Chronicle</span></div></div></div></section><section class="section paper"><div class="wrap"><div class="eyebrow">Executive clarity</div><h2 class="sectionTitle">The site separates proof from power.</h2><div class="grid3"><div class="tile"><h3>Public evidence room</h3><p>Claims, non-claims, canonical identities, manifests, safety posture, and replay/audit pathway are visible before trust is asked.</p></div><div class="tile"><h3>Read-only operator console</h3><p>Users can generate unsigned GoalOS intents for review. The console cannot connect wallets or broadcast transactions.</p></div><div class="tile"><h3>Institutional architecture</h3><p>The contract, website, Evidence Docket, and legacy expert console are separated into clean roles with human authority boundaries.</p></div></div></div></section><section class="section"><div class="wrap grid2"><div><div class="eyebrow">Claim boundary</div><h2 class="sectionTitle">Grandiose, but accountable.</h2><p class="lead">This is production-grade public communication and proof packaging. It is not an external audit, not a Mainnet activation, not a wallet authorization, and not a guarantee of factual correctness or economic outcome.</p></div><div class="matrix"><div class="cell"><h4>Claimed</h4><p>Website, evidence docket, verification manifest, read-only console, canonical identities.</p></div><div class="cell"><h4>Not claimed</h4><p>External audit, production funding, token approval, wallet transaction, autonomous legal authority.</p></div><div class="cell"><h4>Permitted</h4><p>Public-safe proof, downloadable intent, review brief, manifest inspection.</p></div><div class="cell"><h4>Denied</h4><p>Private-key custody, wallet connection, network switching, Mainnet broadcast.</p></div></div></div></section></main><footer class="footer"><div class="wrap statusLine"><span>GoalOS AGIJobManager Ascension</span><span>·</span><span>Autonomy measured · work proven · value settled</span><span>·</span><a href="production-url.json">production-url.json</a></div></footer><script src="assets/atelier.js"></script></body></html>
