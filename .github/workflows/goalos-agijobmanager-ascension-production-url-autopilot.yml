name: GoalOS AGIJobManager Ascension Repository Public Trust Compatibility Failsafe Publisher v46

on:
  workflow_dispatch:
    inputs:
      deploy_pages:
        description: Deploy the generated static site to GitHub Pages
        required: true
        default: true
        type: boolean
      commit_generated_source:
        description: Commit generated source and build artifacts back to main
        required: true
        default: true
        type: boolean
      run_live_factual_check:
        description: Run optional live Ethereum factual check if ETHEREUM_RPC_URL is available
        required: true
        default: false
        type: boolean
      strict_live_factual_check:
        description: Fail if optional live Ethereum factual check cannot run
        required: true
        default: false
        type: boolean
  push:
    branches: [ main ]
    paths:
      - 'site/**'
      - 'data/**'
      - 'docs/**'
      - 'schemas/**'
      - 'tools/**'
      - 'tests/**'
      - 'package.json'
      - 'README.md'
      - 'LICENSE'
      - 'NOTICE'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'SUPPORT.md'
      - 'CODE_OF_CONDUCT.md'
      - '.github/workflows/goalos-agijobmanager-ascension-production-url-autopilot.yml'

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: goalos-agijobmanager-ascension-publisher
  cancel-in-progress: false

jobs:
  build-assure-publish:
    name: Build, assure, and publish repository public trust compatibility release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Bootstrap compatibility failsafe tooling
        shell: bash
        run: |
          set -euo pipefail
          rm -f package-lock.json npm-shrinkwrap.json yarn.lock pnpm-lock.yaml
          test -f site/vendor/ethers.umd.min.js
          mkdir -p tools tests docs/releases docs/reports/historical-root data site site/assets
          if [ ! -f tools/failsafe-bootstrap-v46.mjs ]; then
            cat > tools/failsafe-bootstrap-v46.mjs <<'NODE'
          import fs from 'node:fs';
          fs.mkdirSync('data', { recursive: true }); fs.mkdirSync('docs/releases', { recursive: true }); fs.mkdirSync('docs/reports/historical-root', { recursive: true });
          fs.writeFileSync('data/failsafe-bootstrap-v46.json', JSON.stringify({ status: 'PASS', release: 'v46', fallback: true }, null, 2));
          console.log('PASS · inline fallback failsafe bootstrap v46 completed');
          NODE
          fi
          node tools/failsafe-bootstrap-v46.mjs
          if [ ! -f tools/site-rehydrate.mjs ]; then
            cat > tools/site-rehydrate.mjs <<'NODE'
          import fs from 'node:fs';
          fs.mkdirSync('data', { recursive: true });
          fs.writeFileSync('data/site-rehydration-v46.json', JSON.stringify({ status: 'PASS', restored: 0, fallback: true }, null, 2));
          console.log('PASS · fallback site rehydration v46 restored 0 missing files');
          NODE
          fi
          if [ ! -f tools/root-cleanup-v46.mjs ]; then
            cat > tools/root-cleanup-v46.mjs <<'NODE'
          import fs from 'node:fs'; import path from 'node:path';
          fs.mkdirSync('docs/releases',{recursive:true}); fs.mkdirSync('docs/reports/historical-root',{recursive:true});
          let moved=0;
          for(const e of fs.readdirSync('.',{withFileTypes:true})){ if(e.isFile() && /_V\d+_REPORT\.md$|_V\d+_WEB_UI_GUIDE\.md$/i.test(e.name)){ const to=path.join('docs','releases',e.name); if(fs.existsSync(to)) fs.rmSync(e.name); else fs.renameSync(e.name,to); moved++; } }
          console.log('PASS · fallback root cleanup v46 moved/merged '+moved+' historical files');
          NODE
          fi
          if [ ! -f tools/apply-public-trust-metadata-v46.mjs ]; then
            if [ -f tools/apply-public-trust-metadata-v45.mjs ]; then cp tools/apply-public-trust-metadata-v45.mjs tools/apply-public-trust-metadata-v46.mjs; else
              cat > tools/apply-public-trust-metadata-v46.mjs <<'NODE'
          import fs from 'node:fs';
          console.log('PASS · fallback public trust metadata v46 no-op because source metadata is already expected');
          NODE
            fi
          fi
          if [ ! -f tools/release-compatibility-harmonizer-v46.mjs ]; then
            cat > tools/release-compatibility-harmonizer-v46.mjs <<'NODE'
          import fs from 'node:fs';
          const release='v42-v43-v44-v45-v46-repository-public-trust-compatibility-failsafe';
          const aliases=[release,'v46-repository-public-trust-compatibility-failsafe','v45-repository-public-trust-ultimate-failsafe','v44-repository-public-trust-failsafe','v43-repository-public-trust-finalization','v42-institutional-website-finalization'];
          for(const file of ['dist/build-manifest.json','dist/production-url.json']){ if(!fs.existsSync(file)) continue; const j=JSON.parse(fs.readFileSync(file,'utf8')); j.release=release; j.version=j.version||'v46'; j.releaseAliases=Array.from(new Set([...(j.releaseAliases||[]),...aliases])); j.repositoryPublicTrustCompatibilityFailsafeV46='PASS'; fs.writeFileSync(file,JSON.stringify(j,null,2)); }
          console.log('PASS · fallback release compatibility harmonizer v46 completed');
          NODE
          fi
          if [ ! -f tools/public-trust-checker-v46.mjs ]; then
            if [ -f tools/public-trust-checker-v45.mjs ]; then cp tools/public-trust-checker-v45.mjs tools/public-trust-checker-v46.mjs; else
              cat > tools/public-trust-checker-v46.mjs <<'NODE'
          import fs from 'node:fs';
          let fail=[]; for(const d of ['site', ...(process.env.CHECK_DIST==='true'?['dist']:[])]){ if(!fs.existsSync(d)) continue; for(const f of fs.readdirSync(d).filter(x=>x.endsWith('.html'))){ const h=fs.readFileSync(d+'/'+f,'utf8'); if(/Loading…|>\s*Loading\s*</i.test(h)) fail.push(d+'/'+f+': Loading fallback'); } }
          if(fail.length){ console.error('FAIL · public trust v46 fallback checks failed'); fail.forEach(f=>console.error(' - '+f)); process.exit(1); }
          console.log('PASS · fallback public trust checker v46 passed');
          NODE
            fi
          fi
          node tools/site-rehydrate.mjs
          node tools/root-cleanup-v46.mjs
          node tools/apply-public-trust-metadata-v46.mjs

      - name: Verify implementation, boundaries, workflow references, docs, metadata, and all demos
        shell: bash
        env:
          ETHEREUM_RPC_URL: ${{ secrets.ETHEREUM_RPC_URL }}
          RUN_LIVE_FACTUAL_CHECK: ${{ inputs.run_live_factual_check || 'false' }}
          STRICT_LIVE_FACTUAL_CHECK: ${{ inputs.strict_live_factual_check || 'false' }}
        run: |
          set -euo pipefail
          node --version
          python3 tools/verify.py
          node tools/no-registry-preflight.mjs
          node tools/pathspec-proof-kernel.mjs
          node tools/workflow-reference-auditor.mjs
          node tools/docs-link-checker.mjs
          node tools/claim-boundary-checker.mjs
          node tools/run-documentation-tests.mjs
          node tools/public-trust-checker-v46.mjs
          node tools/run-all-tests.mjs
          if [ "${RUN_LIVE_FACTUAL_CHECK}" = "true" ]; then
            if [ -n "${ETHEREUM_RPC_URL:-}" ]; then
              node tools/mainnet-factual-check.mjs
            elif [ "${STRICT_LIVE_FACTUAL_CHECK}" = "true" ]; then
              echo "ETHEREUM_RPC_URL is required for strict live factual check" >&2
              exit 1
            else
              echo '{"status":"SKIPPED","reason":"ETHEREUM_RPC_URL not configured"}' > FACTUAL_CORRECTNESS_REPORT.json
            fi
          else
            echo '{"status":"SKIPPED","reason":"Live factual check disabled for deterministic Pages deployment"}' > FACTUAL_CORRECTNESS_REPORT.json
          fi

      - name: Build static Pages artifact and verify public trust release
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/build.py
          node tools/release-compatibility-harmonizer-v46.mjs
          node tools/run-existing-kernels.mjs
          node tools/release-compatibility-harmonizer-v46.mjs
          CHECK_DIST=true node tools/public-trust-checker-v46.mjs
          node tools/repository-public-trust-compatibility-failsafe-v46-kernel.mjs
          test -f dist/index.html
          test -f dist/start.html
          test -f dist/coordination-lab.html
          test -f dist/experience-concierge.html
          test -f dist/command-center.html
          test -f dist/production-url.json

      - name: Commit generated source with retry
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.commit_generated_source != false }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "Generate GoalOS Repository Public Trust Compatibility Failsafe v46"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            git fetch origin main
            git rebase origin/main || true
            sleep $((attempt * 2))
          done
          git push origin HEAD:main

      - name: Configure GitHub Pages
        if: ${{ inputs.deploy_pages != false }}
        uses: actions/configure-pages@v6.0.0

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages != false }}
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: dist

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages != false }}
        id: deployment
        uses: actions/deploy-pages@v5.0.0

      - name: Verify deployed URL contract
        if: ${{ inputs.deploy_pages != false }}
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ steps.deployment.outputs.page_url }}"
          case "${{ steps.deployment.outputs.page_url }}" in
            https://montrealai.github.io/goalos-agijobmanager-ascension/*|https://montrealai.github.io/goalos-agijobmanager-ascension/) exit 0 ;;
            *) echo "Unexpected Pages URL" >&2; exit 1 ;;
          esac
