      - name: Generate read-only operator chamber
        shell: bash
        run: |
          set -euo pipefail
          cat > site/operator-console.html <<'HTML'
          <!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Settlement Chamber · GoalOS AGIJobManager</title><meta name="theme-color" content="#061522"><link rel="stylesheet" href="assets/atelier.css"></head><body><canvas id="field"></canvas><div class="topline">Read-only operator chamber · unsigned intents only · no wallet authority</div><header><div class="nav"><a class="brand" href="index.html"><span class="sigil"></span><span><b>GoalOS</b><span>Settlement Chamber</span></span></a><nav class="links"><a href="index.html">Ascension</a><a class="active" href="operator-console.html">Console</a><a href="evidence/">Evidence</a><a href="verification.html">Verification</a></nav></div></header><main><section class="hero"><div class="wrap grid2"><div><div class="eyebrow">Operator console · human review boundary</div><h1 class="title">Compose intent. <span class="g">Do not execute.</span></h1><p class="lead">Generate a structured GoalOS review object for AGIJobManager lifecycle actions. It is deliberately unsigned and inert until an expert separately simulates, reviews, and authorizes it in a live Mainnet environment.</p><div class="boundary"><b>Authority remains NONE_GRANTED.</b> This page has no Ethereum provider calls, no approvals, no chain switching, and no transaction broadcast pathway.</div></div><div class="stage"><div class="consoleTop"><span>GoalOS intent builder</span><span class="pill">local only</span></div><form id="intentForm" class="form"><label>Lifecycle action<select id="action" class="select"><option>CreateJob</option><option>ApproveAGIALPHA</option><option>ApplyToJob</option><option>CompleteJob</option><option>ValidateJob</option><option>DisapproveJob</option><option>DisputeJob</option><option>FinalizeJob</option><option>ExpireJob</option><option>CancelJob</option></select></label><label>Reviewing role<select id="role" class="select"><option>Human reviewer</option><option>Protocol operator</option><option>Verifier</option><option>Security reviewer</option><option>Institutional steward</option></select></label><label>Mission note<textarea id="mission" class="textarea" placeholder="Describe the intended job, evidence requirement, risk class, and why human review is needed."></textarea></label><div class="actions"><button class="btn primary" type="submit">Generate unsigned intent</button><button class="btn dark" id="copyIntent" type="button">Copy intent</button><a class="btn dark" id="downloadIntent" href="#">Download JSON</a></div></form></div></div></section><section class="section paper"><div class="wrap grid2"><div><div class="eyebrow">Machine-readable preview</div><h2 class="sectionTitle">Every serious action starts as an inspectable object.</h2><p class="lead">A normal user gets clarity; an expert gets structure; the contract gets no authority from this page.</p></div><pre id="intentOut" class="tile mono">Generate an unsigned intent to preview the GoalOS object.</pre></div></section><section class="section"><div class="wrap"><h2 class="sectionTitle">Lifecycle governance map</h2><div class="grid3"><div class="tile"><h3>Before execution</h3><p>Identity check, chain check, token boundary, policy root, risk class, evidence requirement, budget, and rollback expectation.</p></div><div class="tile"><h3>During expert operation</h3><p>Simulation, calldata review, allowance discipline, gas review, typed confirmation, wallet prompt review, and receipt inspection.</p></div><div class="tile"><h3>After settlement</h3><p>Evidence Docket update, Chronicle entry, evaluator disposition, risk ledger, and claim-boundary preservation.</p></div></div></div></section></main><footer class="footer"><div class="wrap">GoalOS Settlement Chamber · Read-only · Human-gated</div></footer><script src="assets/atelier.js"></script></body></html>
