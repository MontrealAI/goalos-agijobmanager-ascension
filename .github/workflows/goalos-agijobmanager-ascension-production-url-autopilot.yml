          <!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Verification · GoalOS AGIJobManager</title><meta name="theme-color" content="#061522"><link rel="stylesheet" href="assets/atelier.css"></head><body><canvas id="field"></canvas><div class="topline">Production verification · GitHub Actions generated · Pages deployed</div><header><div class="nav"><a class="brand" href="index.html"><span class="sigil"></span><span><b>GoalOS</b><span>Verification</span></span></a><nav class="links"><a href="index.html">Ascension</a><a href="operator-console.html">Console</a><a href="evidence/">Evidence</a><a href="architecture.html">Architecture</a><a class="active" href="verification.html">Verification</a></nav></div></header><main><section class="hero"><div class="wrap grid2"><div><div class="eyebrow">Autonomous production URL</div><h1 class="title">Generated. Verified. <span class="g">Published.</span></h1><p class="lead">The workflow generates source, builds the static artifact, runs safety and identity checks, deploys GitHub Pages, and verifies the exact canonical production URL.</p><div class="actions"><a class="btn primary" href="production-url.json">Open production-url.json</a><a class="btn dark" href="build-manifest.json">Open build manifest</a></div></div><div class="stage"><div class="consoleTop"><span>Verification status</span><span class="pill">PASS</span></div><div class="metrics"><div class="metric"><b data-count="2">0</b><span>canonical addresses</span></div><div class="metric"><b data-count="5">0</b><span>public pages</span></div><div class="metric"><b data-count="0">0</b><span>wallet calls</span></div><div class="metric"><b data-count="0">0</b><span>tx broadcasts</span></div></div><p class="mono">https://montrealai.github.io/goalos-agijobmanager-ascension/</p></div></div></section><section class="section paper"><div class="wrap"><h2 class="sectionTitle">Verification checks</h2><div class="grid3"><div class="tile"><h3>Identity</h3><p>Canonical AGIJobManager and AGIALPHA addresses must appear in public pages and manifests.</p></div><div class="tile"><h3>Safety</h3><p>The static site must not contain wallet auto-connect, token approval, chain-switch, or transaction-broadcast primitives.</p></div><div class="tile"><h3>Completeness</h3><p>Homepage, operator console, evidence room, architecture dossier, verification page, and manifest files must exist.</p></div></div></div></section></main><footer class="footer"><div class="wrap">Verification room · GoalOS AGIJobManager Ascension</div></footer><script src="assets/atelier.js"></script></body></html>
