name: GoalOS AGIJobManager Ascension Institutional Atelier v4

on:
  workflow_dispatch:
    inputs:
      deploy_pages:
        description: Deploy the canonical production URL to GitHub Pages
        required: true
        default: true
        type: boolean
      commit_generated_source:
        description: Commit generated repository source back to main
        required: true
        default: true
        type: boolean
  push:
    branches: [main]
    paths:
      - '.github/workflows/goalos-agijobmanager-ascension-production-url-autopilot.yml'
      - 'site/**'
      - 'data/**'
      - 'docs/**'
      - 'schemas/**'
      - 'src/**'
      - 'tools/**'
      - 'tests/**'
      - 'package.json'
      - 'README.md'

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: goalos-agijobmanager-ascension-institutional-atelier
  cancel-in-progress: true

env:
  CANONICAL_REPOSITORY: MontrealAI/goalos-agijobmanager-ascension
  PRODUCTION_URL: https://montrealai.github.io/goalos-agijobmanager-ascension/
  AGIJOBMANAGER_ADDRESS: '0xB3AAeb69b630f0299791679c063d68d6687481d1'
  AGIALPHA_ADDRESS: '0xa61a3b3a130a9c20768eebf97e21515a6046a1fa'

jobs:
  atelier:
    name: Generate elite site, verify, and publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Confirm canonical repository
        shell: bash
        run: |
          set -euo pipefail
          echo "Repository: ${{ github.repository }}"
          test "${{ github.repository }}" = "$CANONICAL_REPOSITORY"
          echo "Canonical production URL: $PRODUCTION_URL"

      - name: Prepare repository foundation
        shell: bash
        run: |
          set -euo pipefail
          rm -rf site data docs schemas src tools tests dist
          mkdir -p site/assets site/evidence data docs schemas src tools tests dist
          : > .nojekyll
          : > site/.nojekyll
          cat > package.json <<'JSON'
          {
            "name": "goalos-agijobmanager-ascension",
            "version": "2.0.0-institutional-atelier",
            "private": true,
            "type": "module",
            "description": "GoalOS-native institutional evidence room and read-only operator console for AGIJobManager Ascension.",
            "scripts": {
              "build": "node tools/build.mjs",
              "test": "node tests/verify.mjs",
              "verify": "node tests/verify.mjs"
            },
            "engines": { "node": ">=20" }
          }
          JSON
          cat > README.md <<'EOF'
          # GoalOS AGIJobManager Ascension

          **Production URL:** https://montrealai.github.io/goalos-agijobmanager-ascension/

          GoalOS-native institutional evidence room for AGIJobManager Ascension: flagship website, Evidence Docket 6.1, verification room, architecture dossier, and read-only operator intent console.

          ## Canonical identities

          - **AGIJobManager:** `0xB3AAeb69b630f0299791679c063d68d6687481d1`
          - **AGIALPHA:** `0xa61a3b3a130a9c20768eebf97e21515a6046a1fa`
          - **Chain:** Ethereum Mainnet, chain id `1`

          ## Product posture

          This repository publishes a static public website and proof room. It does **not** auto-connect wallets, request token approvals, switch networks, broadcast Mainnet transactions, store private keys, or authorize funds.

          ## Doctrine

          A model can answer. An agent can act. An institution must prove. No proof, no settlement. No eval, no propagation. No rollback, no release.
          EOF

      - name: Generate institutional design system
        shell: bash
        run: |
          set -euo pipefail
          cat > site/assets/atelier.css <<'CSS'
          :root{--bg:#03070d;--bg2:#061522;--ink:#f8f4e8;--paper:#f5efe3;--nav:#070b12;--muted:#9daabd;--line:rgba(255,255,255,.15);--line2:rgba(8,20,35,.12);--gold:#ffe68a;--gold2:#f7b640;--aqua:#4ff3ff;--mint:#76ffc4;--violet:#a58bff;--rose:#ff76b7;--panel:rgba(255,255,255,.06);--shadow:0 34px 100px rgba(0,0,0,.45);--max:1220px}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;overflow-x:hidden}body:before{content:"";position:fixed;inset:0;z-index:-3;background:radial-gradient(circle at 14% 8%,rgba(79,243,255,.14),transparent 32%),radial-gradient(circle at 80% 18%,rgba(255,230,138,.12),transparent 28%),radial-gradient(circle at 70% 85%,rgba(165,139,255,.12),transparent 32%),linear-gradient(135deg,#03070d,#061526 50%,#120f2d)}body:after{content:"";position:fixed;inset:0;z-index:-2;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:64px 64px;mask-image:radial-gradient(circle at 50% 20%,#000,transparent 78%)}#field{position:fixed;inset:0;z-index:-1;opacity:.85}a{color:inherit}.topline{height:30px;display:grid;place-items:center;border-bottom:1px solid var(--line);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);background:rgba(0,0,0,.28)}header{position:sticky;top:0;z-index:30;background:rgba(3,7,13,.75);backdrop-filter:blur(20px);border-bottom:1px solid var(--line)}.nav{width:min(var(--max),calc(100% - 42px));margin:auto;display:flex;align-items:center;justify-content:space-between;padding:18px 0;gap:18px}.brand{display:flex;gap:12px;align-items:center;text-decoration:none}.sigil{width:38px;height:38px;border-radius:14px;background:radial-gradient(circle at 42% 38%,#fff 0 5%,var(--aqua) 6% 18%,#13233a 19% 45%,var(--gold) 46% 52%,transparent 53%),linear-gradient(135deg,rgba(118,255,196,.4),rgba(165,139,255,.35));border:1px solid rgba(255,255,255,.3);box-shadow:0 0 34px rgba(79,243,255,.35)}.brand b{display:block;font-size:14px;line-height:1;letter-spacing:.05em}.brand span{display:block;font-size:10px;letter-spacing:.28em;color:#c5d5e8;margin-top:4px}.links{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.links a{font-size:12px;font-weight:900;text-decoration:none;border:1px solid transparent;padding:10px 13px;border-radius:999px;color:#dbe9f7}.links a:hover,.links a.active{border-color:var(--line);background:rgba(255,255,255,.08)}.hero{min-height:calc(100vh - 96px);display:flex;align-items:center;padding:70px 0 80px}.wrap{width:min(var(--max),calc(100% - 42px));margin:auto}.heroGrid{display:grid;grid-template-columns:1.05fr .95fr;gap:58px;align-items:center}.eyebrow{color:var(--gold);text-transform:uppercase;letter-spacing:.32em;font-size:12px;font-weight:950}.title{font-size:clamp(58px,9vw,128px);line-height:.84;letter-spacing:-.085em;margin:18px 0 20px}.title .g{display:block;background:linear-gradient(90deg,#fff9de,#ffe68a 34%,#76ffc4 60%,#4ff3ff 88%);-webkit-background-clip:text;background-clip:text;color:transparent}.subtitle{font-size:clamp(22px,3vw,38px);line-height:1.05;letter-spacing:-.045em;font-weight:900;color:#fff4d2;margin:0 0 18px}.lead{font-size:18px;line-height:1.75;color:#c8d8e9;max-width:720px}.actions{display:flex;flex-wrap:wrap;gap:14px;margin-top:28px}.btn{display:inline-flex;align-items:center;gap:10px;text-decoration:none;border-radius:999px;padding:15px 18px;font-weight:950;font-size:14px;border:1px solid var(--line);cursor:pointer}.btn.primary{background:linear-gradient(90deg,var(--gold),#ffc34d);color:#07111f;border-color:rgba(255,255,255,.45);box-shadow:0 16px 42px rgba(247,182,64,.22)}.btn.dark{background:rgba(255,255,255,.07);color:#fff}.btn:hover{transform:translateY(-1px)}.boundary{margin-top:24px;border:1px solid rgba(255,118,183,.45);background:linear-gradient(90deg,rgba(255,118,183,.12),rgba(255,255,255,.04));border-radius:18px;padding:14px 18px;color:#ffd3e6;font-weight:800;font-size:13px}.stage{position:relative;border:1px solid var(--line);border-radius:36px;padding:26px;background:linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.04));box-shadow:var(--shadow);overflow:hidden}.stage:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(79,243,255,.12),transparent);transform:translateX(-100%);animation:sweep 8s infinite}.consoleTop{display:flex;justify-content:space-between;gap:16px;align-items:center;color:#c6d6e8;font-size:11px;font-weight:950;letter-spacing:.22em;text-transform:uppercase}.pill{border:1px solid rgba(255,230,138,.5);color:var(--gold);background:rgba(255,230,138,.08);border-radius:999px;padding:8px 10px}.core{margin:24px auto;display:grid;place-items:center;width:min(420px,82vw);aspect-ratio:1;border-radius:50%;background:radial-gradient(circle,var(--aqua) 0 11%,var(--violet) 20%,rgba(255,255,255,.08) 21% 28%,transparent 29%),repeating-radial-gradient(circle,rgba(255,255,255,.18) 0 1px,transparent 1px 52px);position:relative}.core strong{color:#06111f;text-align:center;font-size:30px;line-height:.92}.node{position:absolute;width:84px;height:84px;border-radius:50%;display:grid;place-items:center;text-align:center;border:1px solid rgba(255,255,255,.32);background:#0d1827;color:#fff;font-weight:950;box-shadow:0 0 26px rgba(79,243,255,.18)}.n1{top:5%;left:50%;transform:translateX(-50%)}.n2{right:5%;top:27%}.n3{right:13%;bottom:12%}.n4{left:13%;bottom:12%}.n5{left:5%;top:27%}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:18px}.metric{border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:18px;padding:14px}.metric b{font-size:28px;color:var(--gold)}.metric span{display:block;color:#b9c8dc;text-transform:uppercase;font-size:10px;letter-spacing:.2em;font-weight:900}.section{padding:92px 0;border-top:1px solid var(--line)}.section.paper{background:var(--paper);color:#07111f}.sectionTitle{font-size:clamp(42px,6vw,86px);line-height:.9;letter-spacing:-.075em;margin:0 0 18px}.sectionTitle .g{background:linear-gradient(90deg,#0b1a2a,#32567b,#27c7d9,#bf8bff);-webkit-background-clip:text;background-clip:text;color:transparent}.paper .lead{color:#33475f}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:22px}.tile{border:1px solid var(--line);border-radius:26px;background:rgba(255,255,255,.06);padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.15)}.paper .tile{background:#fff;border-color:var(--line2);box-shadow:0 18px 44px rgba(6,20,34,.08)}.tile h3{margin:0 0 10px;font-size:24px;letter-spacing:-.035em}.tile p,.tile li{color:#c8d8e9;line-height:1.65}.paper .tile p,.paper .tile li{color:#40546b}.kicker{color:var(--mint);text-transform:uppercase;letter-spacing:.25em;font-size:11px;font-weight:950}.rail{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:28px 0}.gate{border:1px solid var(--line);border-radius:18px;padding:16px;background:rgba(255,255,255,.05)}.gate b{color:var(--aqua)}.gate span{display:block;color:#dbe7f3;font-weight:900;margin-top:6px}.matrix{display:grid;grid-template-columns:1fr 1fr;gap:1px;border:1px solid var(--line);border-radius:24px;overflow:hidden;background:var(--line)}.cell{background:#08121f;padding:20px}.cell h4{margin:0 0 8px;color:var(--gold)}.cell p{margin:0;color:#c6d6e8}.quote{font-size:clamp(26px,3.7vw,50px);line-height:1.05;letter-spacing:-.045em;color:#fff7d6}.footer{padding:34px 0;color:#aebed0;border-top:1px solid var(--line);background:#02050a}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;word-break:break-all}.form{display:grid;gap:14px}.input,.select,.textarea{width:100%;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.06);color:#fff;padding:13px;font:inherit}.textarea{min-height:150px}.paper .input,.paper .select,.paper .textarea{background:#fff;color:#07111f;border-color:var(--line2)}pre{white-space:pre-wrap;overflow:auto}.seal{display:inline-flex;gap:8px;align-items:center;border:1px solid rgba(118,255,196,.5);border-radius:999px;padding:8px 11px;color:var(--mint);font-weight:950;font-size:12px}.statusLine{display:flex;gap:12px;flex-wrap:wrap}.small{font-size:13px;color:#b8c7d9}.paper .small{color:#5b6d82}@keyframes sweep{0%{transform:translateX(-100%)}55%,100%{transform:translateX(100%)}}@media(max-width:900px){.heroGrid,.grid2,.grid3,.cols{grid-template-columns:1fr}.hero{padding:50px 0}.links{display:none}.metrics,.rail{grid-template-columns:repeat(2,1fr)}.node{width:62px;height:62px;font-size:12px}.core strong{font-size:22px}}@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}#field{display:none}}
