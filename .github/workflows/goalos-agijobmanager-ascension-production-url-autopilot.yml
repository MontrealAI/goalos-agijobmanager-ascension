          <!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Evidence Docket 6.1 · AGIJobManager Ascension</title><link rel="stylesheet" href="../assets/atelier.css"></head><body class="grain"><div class="aurora"></div><header class="topbar"><div class="topline">Evidence Docket 6.1 · public proof room · private intelligence boundary</div><div class="wrap nav"><a class="brand" href="../"><span class="brand-mark"></span><span>Evidence Docket<small>AGIJobManager Ascension</small></span></a><nav class="navlinks"><a href="../">Home</a><a href="../operator-console.html">Console</a><a href="../architecture.html">Architecture</a><a href="../verification.html">Verification</a></nav></div></header><main><section class="hero" style="min-height:auto"><div class="wrap"><div class="kicker">A proof room, not a claim poster</div><h1>What is claimed.<br><span class="grad serif">What is withheld.</span></h1><p class="lead">The Evidence Docket turns AGIJobManager Ascension into an inspectable artifact: identity, lifecycle, safety boundary, proof classes, evaluator posture, and rollback state.</p></div></section><section class="section" style="padding-top:20px"><div class="wrap grid3"><article class="card"><div class="tag">Claim</div><h3>Public-safe ascension layer</h3><p>This repository publishes a GoalOS-native site, operator chamber, evidence room, verification page, schemas, and manifests for AGIJobManager.</p></article><article class="card"><div class="tag">Non-claim</div><h3>No production authority</h3><p>Publication does not mean funds moved, transactions executed, factual correctness certified, or external audit completed.</p></article><article class="card"><div class="tag">Boundary</div><h3>Proof outside, intelligence inside</h3><p>Public artifacts expose commitments, hashes, summaries, and review paths; private traces, secrets, prompts, and privileged data remain out of the public docket.</p></article></div><div class="grid2" style="margin-top:22px"><article class="card"><div class="tag">Docket manifest</div><h3>AGIJOBMANAGER-ASCENSION-DOCKET-6-1</h3><div class="kv"><span>AGIJobManager</span><strong>0xB3AA...81d1</strong></div><div class="kv"><span>AGIALPHA</span><strong>0xa61a...a1fa</strong></div><div class="kv"><span>Chain</span><strong>Ethereum Mainnet</strong></div><div class="kv"><span>Public authority</span><strong>None granted</strong></div></article><article class="card"><div class="tag">Gate law</div><h3>No proof, no settlement.</h3><p>Settlement-grade work requires replayable proof packets, evaluator state, challenge visibility, risk accounting, and human review before any stronger claim is promoted.</p><div class="flow" style="grid-template-columns:repeat(4,1fr)"><div>Proof</div><div>Eval</div><div>Risk</div><div>Review</div></div></article></div><div class="grid3" style="margin-top:22px"><article class="card"><div class="tag">Safety ledger</div><h3>Public invariants</h3><p>Wallet calls: 0<br>Token approvals: 0<br>Network switches: 0<br>Mainnet broadcasts: 0<br>Private key fields: 0</p></article><article class="card"><div class="tag">Selection</div><h3>Terminal disposition</h3><p>HUMAN_REVIEW_REQUIRED. Review package may be downloaded; external execution remains separate.</p></article><article class="card"><div class="tag">Replay</div><h3>Local chamber</h3><p>The console deterministically generates an unsigned docket from form inputs and canonical identities. It is suitable for review, not for authorization.</p></article></div></div></section></main><footer class="footer"><div class="wrap">Evidence Docket 6.1 · claim-bounded public proof.</div></footer><script src="../assets/atelier.js"></script></body></html>
          
