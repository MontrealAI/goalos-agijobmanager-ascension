name: GoalOS AGIJobManager Ascension Pathspec-Proof Final Publisher v15

on:
  workflow_dispatch:
    inputs:
      deploy_pages:
        description: Deploy to GitHub Pages
        required: true
        default: true
        type: boolean
      commit_generated_source:
        description: Commit generated artifacts back to main
        required: true
        default: true
        type: boolean
      run_live_factual_check:
        description: Run live Ethereum Mainnet identity check through RPC. Recommended only with ETHEREUM_RPC_URL secret.
        required: true
        default: false
        type: boolean
      strict_live_factual_check:
        description: Fail deployment if live RPC factual check cannot complete.
        required: true
        default: false
        type: boolean
  push:
    branches: [ main ]
    paths:
      - 'site/**'
      - 'data/**'
      - 'schemas/**'
      - 'src/**'
      - 'tools/**'
      - 'tests/**'
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
      - 'AGIJOBMANAGER_ASCENSION_QA.md'
      - 'FINAL_ASSURANCE_DOCKET_V11.json'
      - 'FINAL_ASSURANCE_DOCKET_V11.md'
      - '.github/workflows/goalos-agijobmanager-ascension-production-url-autopilot.yml'

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: agijobmanager-ascension-pathspec-proof-final-v15
  cancel-in-progress: false

jobs:
  publish:
    name: Build, assure, and publish without registry installs or pathspec fragility
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.0
        with:
          fetch-depth: 0

      - name: Zero-network preflight
        shell: bash
        run: |
          set -euo pipefail
          echo "Node: $(node --version)"
          echo "Python: $(python3 --version)"
          test -f package.json
          test -f tools/no-registry-preflight.mjs
          test -f site/vendor/ethers.umd.min.js
          node tools/no-registry-preflight.mjs
          node tools/pathspec-proof-kernel.mjs

      - name: Verify implementation, boundaries, token posture, and final assurance
        shell: bash
        env:
          RUN_LIVE_FACTUAL_CHECK: ${{ inputs.run_live_factual_check }}
          SKIP_LIVE_RPC: ${{ inputs.run_live_factual_check == false && '1' || '0' }}
          STRICT_LIVE_FACTUAL_CHECK: ${{ inputs.strict_live_factual_check }}
          ETHEREUM_RPC_URL: ${{ secrets.ETHEREUM_RPC_URL }}
        run: |
          set -euo pipefail
          npm run test
          npm run assurance
          npm run assurance:final
          npm run legal
          npm run token-boundary
          if [ "${RUN_LIVE_FACTUAL_CHECK}" = "true" ]; then
            SKIP_LIVE_RPC=0 RUN_LIVE_FACTUAL_CHECK=true STRICT_LIVE_FACTUAL_CHECK=${STRICT_LIVE_FACTUAL_CHECK} npm run factual:mainnet
          else
            SKIP_LIVE_RPC=1 RUN_LIVE_FACTUAL_CHECK=false STRICT_LIVE_FACTUAL_CHECK=false npm run factual:mainnet
          fi
          node tools/no-registry-preflight.mjs
          node tools/pathspec-proof-kernel.mjs

      - name: Build static Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          npm run build
          npm run assurance:final
          npm run legal
          npm run token-boundary
          node tools/no-registry-preflight.mjs
          node tools/pathspec-proof-kernel.mjs
          test -f dist/index.html
          test -f dist/operator-console.html
          test -f dist/expert-console.html
          test -f dist/expert-mainnet-console.html
          test -f dist/sovereign-machine-economy.html
          test -f dist/assurance.html
          test -f dist/legal.html
          test -f dist/privacy.html
          test -f dist/terms.html
          test -f dist/regulatory-boundary.html
          test -f dist/third-party-responsibility.html
          test -f dist/legal-boundary-policy.json
          test -f dist/agialpha-token-boundary.json
          test -f dist/agialpha-token-boundary.html
          test -f dist/FINAL_ASSURANCE_DOCKET_V11.json
          test -f dist/data/final-assurance-policy.json
          grep -q 'zeroNetworkPublisher' dist/production-url.json
          grep -q 'pathspecProofPublisher' dist/production-url.json
          grep -q 'finalAssurance' dist/production-url.json
          grep -q 'Final Assurance Kernel' dist/assurance.html
          grep -q 'No user data' dist/legal.html
          grep -q 'not available from MontrealAI' dist/agialpha-token-boundary.html
          grep -q 'not available from this website' dist/agialpha-token-boundary.html
          grep -q '0xA61a3B3a130a9c20768EEBF97E21515A6046a1fA' dist/agialpha-token-boundary.html
          grep -q 'We do not want' dist/privacy.html
          if grep -R -E "registry[.]npmjs|cdn[.]jsdelivr|unpkg[.]com" dist site .github/workflows; then
            echo 'Forbidden external registry/CDN reference detected.' >&2
            exit 1
          fi

      - name: Commit generated source with retry
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.commit_generated_source == true }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git status --short
          git add -A
          if git diff --cached --quiet; then
            echo 'No generated changes to commit.'
            exit 0
          fi
          git commit -m 'Add Pathspec-Proof Final Publisher v15'
          for i in 1 2 3 4; do
            git pull --rebase origin main || true
            if git push origin HEAD:main; then exit 0; fi
            sleep $((i * 5))
          done
          echo 'Failed to push after retries.' >&2
          exit 1

      - name: Configure GitHub Pages
        if: ${{ inputs.deploy_pages == true || github.event_name == 'push' }}
        uses: actions/configure-pages@v6.0.0

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages == true || github.event_name == 'push' }}
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: dist

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages == true || github.event_name == 'push' }}
        id: deployment
        uses: actions/deploy-pages@v5.0.0

      - name: Verify deployed URL contract
        if: ${{ inputs.deploy_pages == true || github.event_name == 'push' }}
        shell: bash
        run: |
          set -euo pipefail
          expected='https://montrealai.github.io/goalos-agijobmanager-ascension/'
          echo "Expected prefix: $expected"
          echo "Actual:          ${{ steps.deployment.outputs.page_url }}"
          case "${{ steps.deployment.outputs.page_url }}" in
            https://montrealai.github.io/goalos-agijobmanager-ascension/*) echo 'Production URL PASS' ;;
            *) echo 'Production URL mismatch' >&2; exit 1 ;;
          esac
