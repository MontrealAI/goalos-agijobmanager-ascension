          {"name":"GoalOS AGIJobManager Ascension","short_name":"AGIJobManager","start_url":"./","display":"standalone","background_color":"#03070d","theme_color":"#061522","description":"GoalOS-native institutional evidence room for AGIJobManager Ascension."}
          JSON
          cat > site/production-url.json <<JSON
          {"schema":"goalos.production_url.v2","repository":"$CANONICAL_REPOSITORY","productionUrl":"$PRODUCTION_URL","status":"PASS","generatedBy":"GoalOS AGIJobManager Ascension Institutional Atelier v4","contract":"$AGIJOBMANAGER_ADDRESS","token":"$AGIALPHA_ADDRESS","chainId":1,"safety":{"walletAutoConnect":false,"tokenApproval":false,"networkSwitch":false,"transactionBroadcast":false,"privateKeys":false}}
