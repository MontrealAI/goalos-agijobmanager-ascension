name: GoalOS AGIJobManager Ascension Production URL Autopilot v3

on:
  workflow_dispatch:
    inputs:
      deploy_pages:
        description: Deploy the canonical production URL to GitHub Pages
        required: true
        default: true
        type: boolean
      commit_generated_source:
        description: Commit generated repository source back to main
        required: true
        default: true
        type: boolean
  push:
    branches: [main]
    paths:
      - '.github/workflows/goalos-agijobmanager-ascension-production-url-autopilot.yml'
      - 'site/**'
      - 'data/**'
      - 'docs/**'
      - 'schemas/**'
      - 'src/**'
      - 'tools/**'
      - 'tests/**'
      - 'package.json'
      - 'README.md'

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: goalos-agijobmanager-ascension-production
  cancel-in-progress: true

env:
  CANONICAL_REPOSITORY: MontrealAI/goalos-agijobmanager-ascension
  PRODUCTION_URL: https://montrealai.github.io/goalos-agijobmanager-ascension/
  AGIJOBMANAGER_ADDRESS: '0xB3AAeb69b630f0299791679c063d68d6687481d1'
  AGIALPHA_ADDRESS: '0xa61a3b3a130a9c20768eebf97e21515a6046a1fa'

jobs:
  build_publish:
    name: Generate, verify, and publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Confirm canonical repository
        shell: bash
        run: |
          set -euo pipefail
          echo "Repository: ${{ github.repository }}"
          test "${{ github.repository }}" = "$CANONICAL_REPOSITORY"
          echo "Canonical production URL: $PRODUCTION_URL"

      - name: Prepare directories and base files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site/evidence data docs schemas src tools tests dist
          cat > package.json <<'JSON'
          {"name":"goalos-agijobmanager-ascension","version":"1.0.0","private":true,"type":"module","scripts":{"build":"node tools/build.mjs","test":"node tests/verify.mjs","verify":"node tests/verify.mjs"},"engines":{"node":">=20"}}
          JSON
          : > .nojekyll
          cat > README.md <<'EOF'
          # GoalOS AGIJobManager Ascension

          Production URL: https://montrealai.github.io/goalos-agijobmanager-ascension/

          GoalOS-native public evidence room for AGIJobManager Ascension.

          Canonical identities:
          - AGIJobManager: `0xB3AAeb69b630f0299791679c063d68d6687481d1`
          - AGIALPHA: `0xa61a3b3a130a9c20768eebf97e21515a6046a1fa`
          - Chain: Ethereum Mainnet, chain id `1`

          This repository publishes a static public website, Evidence Docket, verification page, and read-only operator console. It does not auto-connect wallets, approve tokens, broadcast Mainnet transactions, store private keys, or authorize funds.
          EOF

      - name: Write institutional CSS
        shell: bash
        run: |
          set -euo pipefail
          cat > site/styles.css <<'CSS'
          :root{--ink:#07111f;--muted:#5b6d82;--gold:#f7ca58;--aqua:#51e5ff;--mint:#93f0bd;--violet:#8d7aff;--panel:#101c2f;--line:rgba(255,255,255,.18)}*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);background:#f7f4ec}header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.9);backdrop-filter:blur(18px);border-bottom:1px solid rgba(7,17,31,.08)}.nav{max-width:1180px;margin:auto;padding:20px;display:flex;justify-content:space-between;align-items:center;gap:22px}.brand{display:flex;gap:12px;align-items:center;text-decoration:none;color:var(--ink);font-weight:900;letter-spacing:-.04em}.orb{width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff,#081525 42%,#fff 45%,#dfe7ee);box-shadow:0 0 22px rgba(81,229,255,.35)}nav{display:flex;gap:20px;flex-wrap:wrap}nav a{color:var(--ink);font-weight:800;font-size:14px;text-decoration:none}.hero{min-height:86vh;background:radial-gradient(circle at 20% 10%,rgba(81,229,255,.25),transparent 34%),radial-gradient(circle at 75% 25%,rgba(247,202,88,.2),transparent 30%),linear-gradient(135deg,#07111f,#0b2940 45%,#1a1640);color:#fff;display:flex;align-items:center;overflow:hidden}.wrap{width:min(1180px,calc(100% - 44px));margin:auto}.grid{display:grid;grid-template-columns:1.15fr .85fr;gap:56px;align-items:center}.eyebrow{color:var(--gold);font-size:13px;font-weight:950;letter-spacing:.24em;text-transform:uppercase}.h1{font-size:clamp(58px,9vw,128px);line-height:.84;letter-spacing:-.08em;margin:18px 0}.grad{background:linear-gradient(90deg,#fff4c7,#f7ca58,#93f0bd,#51e5ff);-webkit-background-clip:text;background-clip:text;color:transparent}.lead{font-size:20px;line-height:1.65;color:#d7e5f3;max-width:700px}.chips{display:flex;gap:10px;flex-wrap:wrap;margin-top:25px}.chip{border:1px solid var(--line);border-radius:999px;padding:10px 14px;background:rgba(255,255,255,.08);font-weight:850}.btns{display:flex;gap:14px;flex-wrap:wrap;margin-top:28px}.btn{display:inline-flex;align-items:center;gap:9px;border-radius:999px;padding:14px 18px;font-weight:950;text-decoration:none;border:0;cursor:pointer}.primary{background:var(--gold);color:#06111d}.secondary{border:1px solid var(--line);color:#fff;background:rgba(255,255,255,.07)}.card{border:1px solid var(--line);border-radius:34px;background:linear-gradient(145deg,rgba(255,255,255,.14),rgba(255,255,255,.05));box-shadow:0 30px 90px rgba(0,0,0,.32);padding:28px}.diagram{aspect-ratio:1;border-radius:50%;display:grid;place-items:center;text-align:center;background:radial-gradient(circle,#51e5ff 0,#8d7aff 25%,rgba(255,255,255,.08) 26%,rgba(255,255,255,.03) 55%,transparent 56%);border:1px solid var(--line)}.diagram b{font-size:28px;color:#06111d}.section{padding:90px 22px}.section.dark{background:#06111d;color:#fff}.section h2{font-size:clamp(40px,5vw,72px);line-height:.94;letter-spacing:-.07em;margin:0 0 18px}.section p{font-size:18px;line-height:1.7;color:#3b4d62}.dark p{color:#c8d8eb}.cols{max-width:1180px;margin:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:20px}.tile{border:1px solid rgba(7,17,31,.12);border-radius:28px;background:#fff;padding:24px}.dark .tile{background:rgba(255,255,255,.06);border-color:var(--line)}.tile h3{font-size:24px;margin:0 0 10px}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;word-break:break-all}.notice{border:1px solid rgba(247,202,88,.6);background:rgba(247,202,88,.12);border-radius:24px;padding:20px}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:30px}.kpi{border:1px solid rgba(7,17,31,.1);border-radius:22px;background:#fff;padding:20px}.kpi strong{display:block;font-size:30px;letter-spacing:-.04em}.footer{background:#040a13;color:#9fb1c7;padding:48px 22px}.footer div{max-width:1180px;margin:auto}@media(max-width:880px){.grid,.cols,.kpis{grid-template-columns:1fr}.hero{min-height:auto;padding:70px 0}.nav{align-items:flex-start;flex-direction:column}.h1{font-size:56px}.section{padding:60px 18px}}
          CSS

      - name: Write homepage
        shell: bash
        run: |
          set -euo pipefail
          cat > site/index.html <<'HTML'
          <!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GoalOS AGIJobManager Ascension</title><meta name="description" content="GoalOS-native public evidence room for AGIJobManager Ascension."><link rel="stylesheet" href="styles.css"></head><body><header><div class="nav"><a class="brand" href="index.html"><span class="orb"></span><span>GoalOS<br>AGIJobManager</span></a><nav><a href="index.html">Home</a><a href="operator-console.html">Operator Console</a><a href="evidence/">Evidence</a><a href="verification.html">Verification</a><a href="docs.html">Docs</a></nav></div></header><main><section class="hero"><div class="wrap grid"><div><div class="eyebrow">GoalOS-native α‑AGI Ascension · Ethereum Mainnet</div><h1 class="h1">Verified machine labor needs <span class="grad">proof settlement.</span></h1><p class="lead">A prestigious, public-safe front door for AGIJobManager: contract identity, Evidence Docket, read-only operator planning, verification manifests, and claim boundaries for institutional review.</p><div class="chips"><span class="chip">AGIJobManager 0xB3AA...81d1</span><span class="chip">AGIALPHA 0xa61a...a1fa</span><span class="chip">Chain 1</span><span class="chip">No wallet auto-connect</span></div><div class="btns"><a class="btn primary" href="evidence/">Open Evidence Docket →</a><a class="btn secondary" href="operator-console.html">Read-only operator console</a></div></div><div class="card"><div class="diagram"><b>PROOF<br>SETTLES<br>WORK</b></div></div></div></section><section class="section"><div class="wrap"><div class="eyebrow">Canonical public institution</div><h2>From raw contract console to GoalOS evidence architecture.</h2><p>AGIJobManager is the on-chain settlement machine. This repository is the public institution around it: the evidence room, verification surface, operator guide, manifest layer, and autonomous GitHub Pages publisher.</p><div class="kpis"><div class="kpi"><strong>10</strong>legacy lifecycle actions</div><div class="kpi"><strong>0</strong>wallet auto-connect calls</div><div class="kpi"><strong>1</strong>canonical production URL</div><div class="kpi"><strong>6.1</strong>Evidence Docket posture</div></div></div></section><section class="section dark"><div class="wrap"><div class="eyebrow">Institutional operating law</div><h2>No proof, no settlement. No eval, no propagation. No rollback, no release.</h2><p>The site separates explanation, evidence, and execution. It provides public proof surfaces and read-only intent generation, while keeping Mainnet signing outside the website.</p><div class="cols"><div class="tile"><h3>Contract identity</h3><p class="mono">0xB3AAeb69b630f0299791679c063d68d6687481d1</p></div><div class="tile"><h3>Official token</h3><p class="mono">0xa61a3b3a130a9c20768eebf97e21515a6046a1fa</p></div><div class="tile"><h3>Production URL</h3><p class="mono">https://montrealai.github.io/goalos-agijobmanager-ascension/</p></div></div></div></section><section class="section"><div class="cols"><div class="tile"><h3>Evidence Docket</h3><p>Claims, non-claims, addresses, publication status, replay path, and safety boundary.</p><a class="btn primary" href="evidence/">Inspect evidence</a></div><div class="tile"><h3>Operator Console</h3><p>Generate unsigned GoalOS intent JSON for review. No wallet connection or transaction broadcasting.</p><a class="btn primary" href="operator-console.html">Open console</a></div><div class="tile"><h3>Verification</h3><p>Read production URL manifest checks, canonical identity checks, and public-safety checks.</p><a class="btn primary" href="verification.html">Verify</a></div></div></section></main><footer class="footer"><div>© MontrealAI · GoalOS AGIJobManager Ascension · Public evidence and read-only operator layer only.</div></footer></body></html>
          HTML

      - name: Write console, evidence, verification, and docs pages
        shell: bash
        run: |
          set -euo pipefail
          cat > site/operator-console.html <<'HTML'
          <!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Read-only Operator Console</title><link rel="stylesheet" href="styles.css"></head><body><header><div class="nav"><a class="brand" href="index.html"><span class="orb"></span><span>GoalOS<br>AGIJobManager</span></a><nav><a href="index.html">Home</a><a href="evidence/">Evidence</a><a href="verification.html">Verification</a></nav></div></header><main><section class="section dark"><div class="wrap"><div class="eyebrow">Read-only planning console</div><h1 class="h1">Unsigned intent, not wallet execution.</h1><p class="lead">This page creates a reviewable GoalOS intent object for AGIJobManager actions. It does not connect a wallet, request approval, switch networks, or broadcast transactions.</p><div class="notice"><strong>Safety boundary:</strong> use expert Mainnet tools only after independent review, simulation, allowance discipline, and human approval.</div><form id="intent" class="tile" style="margin-top:28px;color:#07111f"><label>Action<br><select id="action"><option>CreateJob</option><option>Apply</option><option>Complete</option><option>Validate</option><option>Dispute</option><option>Finalize</option><option>Cancel</option></select></label><br><br><label>Human note<br><textarea id="note" rows="5" style="width:100%" placeholder="Describe what you want reviewed."></textarea></label><br><br><button class="btn primary" type="submit">Generate unsigned intent</button></form><pre id="out" class="tile mono" style="white-space:pre-wrap;color:#07111f"></pre></div></section></main><script>document.getElementById('intent').addEventListener('submit',e=>{e.preventDefault();const o={schema:'goalos.agijobmanager.intent.v1',chainId:1,contract:'0xB3AAeb69b630f0299791679c063d68d6687481d1',token:'0xa61a3b3a130a9c20768eebf97e21515a6046a1fa',action:document.getElementById('action').value,note:document.getElementById('note').value,createdAt:new Date().toISOString(),claimBoundary:'Unsigned planning artifact only. No wallet connection, no approval, no transaction broadcast.'};document.getElementById('out').textContent=JSON.stringify(o,null,2);});</script></body></html>
          HTML
          cat > site/evidence/index.html <<'HTML'
          <!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Evidence Docket 6.1</title><link rel="stylesheet" href="../styles.css"></head><body><header><div class="nav"><a class="brand" href="../index.html"><span class="orb"></span><span>GoalOS<br>Evidence</span></a><nav><a href="../index.html">Home</a><a href="../operator-console.html">Console</a><a href="../verification.html">Verification</a></nav></div></header><main><section class="section dark"><div class="wrap"><div class="eyebrow">Evidence Docket 6.1</div><h1 class="h1">A proof page is not a marketing page.</h1><p class="lead">This docket records the public-safe boundary for AGIJobManager Ascension: what is claimed, what is not claimed, what is canonical, and what remains outside this website.</p><div class="cols"><div class="tile"><h3>Claimed</h3><p>Static public evidence room, read-only operator planning console, canonical addresses, production URL, verification manifest.</p></div><div class="tile"><h3>Not claimed</h3><p>No external audit completion, no Mainnet activation, no wallet authorization, no token approval, no production-fund authorization.</p></div><div class="tile"><h3>Canonical identities</h3><p class="mono">AGIJobManager: 0xB3AAeb69b630f0299791679c063d68d6687481d1<br>AGIALPHA: 0xa61a3b3a130a9c20768eebf97e21515a6046a1fa</p></div></div></div></section></main></body></html>
          HTML
          cat > site/verification.html <<'HTML'
          <!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Verification</title><link rel="stylesheet" href="styles.css"></head><body><header><div class="nav"><a class="brand" href="index.html"><span class="orb"></span><span>GoalOS<br>Verification</span></a><nav><a href="index.html">Home</a><a href="operator-console.html">Console</a><a href="evidence/">Evidence</a></nav></div></header><main><section class="section"><div class="wrap"><div class="eyebrow">Production verification</div><h1 class="h1" style="color:#07111f">Canonical URL generated by GitHub Actions.</h1><div class="cols"><div class="tile"><h3>Repository</h3><p class="mono">MontrealAI/goalos-agijobmanager-ascension</p></div><div class="tile"><h3>Production URL</h3><p class="mono">https://montrealai.github.io/goalos-agijobmanager-ascension/</p></div><div class="tile"><h3>Safety posture</h3><p>No wallet auto-connect, no token approval, no transaction broadcast, no private key storage.</p></div></div><p><a class="btn primary" href="production-url.json">Open production-url.json</a></p></div></section></main></body></html>
          HTML
          cat > site/docs.html <<'HTML'
          <!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Docs · GoalOS AGIJobManager Ascension</title><link rel="stylesheet" href="styles.css"></head><body><header><div class="nav"><a class="brand" href="index.html"><span class="orb"></span><span>GoalOS<br>Docs</span></a><nav><a href="index.html">Home</a><a href="operator-console.html">Console</a><a href="evidence/">Evidence</a><a href="verification.html">Verification</a></nav></div></header><main><section class="section"><div class="wrap"><div class="eyebrow">Documentation</div><h1 class="h1" style="color:#07111f">Trusted architecture, explicit boundaries.</h1><div class="cols"><div class="tile"><h3>What this repo is</h3><p>A GitHub Pages product repository that explains, verifies, and packages AGIJobManager as a GoalOS-native proof-settlement layer.</p></div><div class="tile"><h3>What the contract is</h3><p>The Ethereum Mainnet settlement contract at 0xB3AAeb69b630f0299791679c063d68d6687481d1.</p></div><div class="tile"><h3>What it is not</h3><p>It is not an external audit, not a wallet, not a token approval surface, and not a Mainnet transaction broadcaster.</p></div></div></div></section></main></body></html>
          HTML

      - name: Write manifests and tooling
        shell: bash
        run: |
          set -euo pipefail
          cat > site/production-url.json <<JSON
          {"repository":"$CANONICAL_REPOSITORY","productionUrl":"$PRODUCTION_URL","status":"PASS","generatedBy":"GoalOS AGIJobManager Ascension Production URL Autopilot v3","contract":"$AGIJOBMANAGER_ADDRESS","token":"$AGIALPHA_ADDRESS","chainId":1}
          JSON
          cp site/production-url.json data/production-url.json
          cat > schemas/goalos-intent.schema.json <<'JSON'
          {"$schema":"https://json-schema.org/draft/2020-12/schema","title":"GoalOS AGIJobManager Unsigned Intent","type":"object","required":["schema","chainId","contract","token","action","claimBoundary"],"properties":{"schema":{"const":"goalos.agijobmanager.intent.v1"},"chainId":{"const":1},"contract":{"const":"0xB3AAeb69b630f0299791679c063d68d6687481d1"},"token":{"const":"0xa61a3b3a130a9c20768eebf97e21515a6046a1fa"},"action":{"type":"string"},"claimBoundary":{"type":"string"}}}
          JSON
          cat > tools/build.mjs <<'JS'
          import {cpSync,rmSync,mkdirSync,writeFileSync} from 'node:fs';
          rmSync('dist',{recursive:true,force:true}); mkdirSync('dist',{recursive:true}); cpSync('site','dist',{recursive:true});
          writeFileSync('dist/PRODUCTION_URL.txt','https://montrealai.github.io/goalos-agijobmanager-ascension/\n');
          JS
          cat > tests/verify.mjs <<'JS'
          import {readFileSync,existsSync} from 'node:fs';
          const required=['site/index.html','site/operator-console.html','site/evidence/index.html','site/verification.html','site/production-url.json','schemas/goalos-intent.schema.json'];
          for (const f of required) if (!existsSync(f)) throw new Error(`missing ${f}`);
          const all=required.map(f=>readFileSync(f,'utf8')).join('\n');
          const checks=['0xB3AAeb69b630f0299791679c063d68d6687481d1','0xa61a3b3a130a9c20768eebf97e21515a6046a1fa','https://montrealai.github.io/goalos-agijobmanager-ascension/','No wallet auto-connect','no token approval','no transaction broadcast'];
          for (const s of checks) if (!all.includes(s)) throw new Error(`missing check: ${s}`);
          console.log('GoalOS AGIJobManager Ascension verification PASS');
          JS

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test and build
        shell: bash
        run: |
          set -euo pipefail
          npm test
          npm run build
          test -f dist/index.html
          grep -q "$PRODUCTION_URL" dist/production-url.json
          grep -q "$AGIJOBMANAGER_ADDRESS" dist/index.html
          grep -q "$AGIALPHA_ADDRESS" dist/index.html
          echo "Production build PASS: $PRODUCTION_URL"

      - name: Commit generated source
        if: ${{ github.event_name == 'push' || inputs.commit_generated_source }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md package.json .nojekyll site data docs schemas src tools tests dist
          if git diff --cached --quiet; then
            echo "No generated source changes to commit."
          else
            git commit -m "Generate GoalOS AGIJobManager Ascension production site"
            git push
          fi

      - name: Configure GitHub Pages
        if: ${{ github.event_name == 'push' || inputs.deploy_pages }}
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: ${{ github.event_name == 'push' || inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy GitHub Pages
        if: ${{ github.event_name == 'push' || inputs.deploy_pages }}
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify deployed URL
        if: ${{ github.event_name == 'push' || inputs.deploy_pages }}
        shell: bash
        run: |
          set -euo pipefail
          echo "GitHub Pages reported: ${{ steps.deployment.outputs.page_url }}"
          test "${{ steps.deployment.outputs.page_url }}" = "$PRODUCTION_URL"
