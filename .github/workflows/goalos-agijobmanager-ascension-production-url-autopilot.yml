          cat > data/evidence-docket-6-1.json <<JSON
          {"schema":"goalos.evidence_docket.6_1.public","subject":"GoalOS AGIJobManager Ascension","claims":["public evidence room","read-only operator console","verification page","architecture dossier"],"nonClaims":["external audit completion","production activation","wallet authorization","token approval","Mainnet transaction broadcast"],"canonical":{"contract":"$AGIJOBMANAGER_ADDRESS","token":"$AGIALPHA_ADDRESS","chainId":1,"url":"$PRODUCTION_URL"}}
