      - name: Commit generated source with resilient push
        shell: bash
        run: |
          set -euo pipefail
          COMMIT_SOURCE="false"
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then COMMIT_SOURCE="true"; fi
          if [[ "${{ inputs.commit_generated_source }}" == "true" ]]; then COMMIT_SOURCE="true"; fi
          if [[ "${COMMIT_SOURCE}" != "true" ]]; then
            echo "Skipping generated-source commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md package.json .nojekyll site dist data schemas docs tools tests AGIJOBMANAGER_ASCENSION_QA.md
          if git diff --cached --quiet; then
            echo "No generated source changes."
            exit 0
          fi
          git commit -m "Generate final AGIJobManager Ascension production chamber"
          for attempt in 1 2 3 4; do
            echo "Push attempt ${attempt}"
            git fetch origin main
            git rebase origin/main || { git rebase --abort || true; sleep 2; continue; }
            if git push origin HEAD:main; then
              echo "Generated source pushed."
              exit 0
            fi
            sleep $((attempt * 3))
          done
          echo "Unable to push generated source after retries."
          exit 1

      - name: Configure GitHub Pages
        if: ${{ github.event_name == 'push' || inputs.deploy_pages }}
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: ${{ github.event_name == 'push' || inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy GitHub Pages
        if: ${{ github.event_name == 'push' || inputs.deploy_pages }}
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify deployed URL
        if: ${{ github.event_name == 'push' || inputs.deploy_pages }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Expected: ${PRODUCTION_URL}"
          echo "GitHub reported: ${{ steps.deployment.outputs.page_url }}"
          case "${{ steps.deployment.outputs.page_url }}" in
            "${PRODUCTION_URL}"*) echo "Production URL verified." ;;
            *) echo "Unexpected Pages URL."; exit 1 ;;
          esac
