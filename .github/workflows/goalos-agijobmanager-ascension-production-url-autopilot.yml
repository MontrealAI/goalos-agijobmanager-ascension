          {"AGIJobManager":"$AGIJOBMANAGER_ADDRESS","AGIALPHA":"$AGIALPHA_ADDRESS","chainId":1,"productionUrl":"$PRODUCTION_URL","repository":"$CANONICAL_REPOSITORY"}
