          {"schema":"goalos.build_manifest.v4","product":"GoalOS AGIJobManager Ascension","designLanguage":"institutional-atelier","productionUrl":"$PRODUCTION_URL","generatedAt":"$(date -u +%Y-%m-%dT%H:%M:%SZ)","pages":["index.html","operator-console.html","evidence/index.html","architecture.html","verification.html"],"canonicalIdentities":{"AGIJobManager":"$AGIJOBMANAGER_ADDRESS","AGIALPHA":"$AGIALPHA_ADDRESS","chainId":1}}
