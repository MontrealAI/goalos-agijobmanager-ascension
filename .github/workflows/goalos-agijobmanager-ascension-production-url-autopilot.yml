          {"$schema":"https://json-schema.org/draft/2020-12/schema","title":"GoalOS AGIJobManager Unsigned Intent","type":"object","required":["schema","chainId","contract","token","action","claimBoundary"],"properties":{"schema":{"const":"goalos.agijobmanager.intent.v2"},"chainId":{"const":1},"contract":{"const":"0xB3AAeb69b630f0299791679c063d68d6687481d1"},"token":{"const":"0xa61a3b3a130a9c20768eebf97e21515a6046a1fa"},"action":{"type":"string"},"claimBoundary":{"type":"string"}}}
