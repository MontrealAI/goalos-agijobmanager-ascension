name: GoalOS AGIJobManager Ascension Repository Public Trust Failsafe Publisher v44

on:
  workflow_dispatch:
    inputs:
      deploy_pages:
        description: Deploy the generated static site to GitHub Pages
        required: true
        default: true
        type: boolean
      commit_generated_source:
        description: Commit generated source and build artifacts back to main
        required: true
        default: true
        type: boolean
      run_live_factual_check:
        description: Run optional live Ethereum factual check if ETHEREUM_RPC_URL is available
        required: true
        default: false
        type: boolean
      strict_live_factual_check:
        description: Fail if optional live Ethereum factual check cannot run
        required: true
        default: false
        type: boolean
  push:
    branches: [ main ]
    paths:
      - 'site/**'
      - 'data/**'
      - 'docs/**'
      - 'schemas/**'
      - 'tools/**'
      - 'tests/**'
      - 'package.json'
      - '.github/workflows/goalos-agijobmanager-ascension-production-url-autopilot.yml'

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: goalos-agijobmanager-ascension-publisher
  cancel-in-progress: false

jobs:
  build-assure-publish:
    name: Build, assure, and publish repository public trust failsafe release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Bootstrap resilient public-trust tooling
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tools docs/releases docs/reports/historical-root data site
          # inline root cleanup fallback is embedded below for partial Web UI uploads
          if [ ! -f tools/site-rehydrate.mjs ]; then
            cat > tools/site-rehydrate.mjs <<'NODE'
          import fs from 'node:fs';
          fs.mkdirSync('data', { recursive: true });
          fs.writeFileSync('data/site-rehydration-v44.json', JSON.stringify({ status: 'PASS', restored: 0, fallback: true }, null, 2));
          console.log('PASS · fallback site rehydration v44 restored 0 missing files');
          NODE
          fi
          # inline root cleanup fallback: the workflow can recover even if the helper file was missed during upload
          # inline root cleanup fallback prevents MODULE_NOT_FOUND failures after partial Web UI uploads
          if [ ! -f tools/root-cleanup-v44.mjs ]; then
            cat > tools/root-cleanup-v44.mjs <<'NODE'
          import fs from 'node:fs';
          import path from 'node:path';
          const root = process.cwd();
          const releases = path.join(root, 'docs', 'releases');
          const reports = path.join(root, 'docs', 'reports', 'historical-root');
          fs.mkdirSync(releases, { recursive: true });
          fs.mkdirSync(reports, { recursive: true });
          const keep = new Set(['README.md','CONTRIBUTING.md','SECURITY.md','SUPPORT.md','CODE_OF_CONDUCT.md','LICENSE','NOTICE','NOTICE.md','package.json','.nojekyll']);
          const reportLike = [/_V\d+_REPORT\.(md|json)$/i,/_V\d+_WEB_UI_GUIDE\.md$/i,/_REPORT\.(md|json)$/i,/_WEB_UI_GUIDE\.md$/i,/^FINAL_ASSURANCE_DOCKET_V\d+\.(md|json)$/i,/^FACTUAL_CORRECTNESS_REPORT\.json$/i,/^REPOSITORY_PUBLIC_TRUST_V\d+_REPORT\.json$/i];
          let moved = 0;
          for (const entry of fs.readdirSync(root, { withFileTypes: true })) {
            if (!entry.isFile() || keep.has(entry.name) || !reportLike.some((re) => re.test(entry.name))) continue;
            const target = /_WEB_UI_GUIDE\.md$/i.test(entry.name) || /^GOALOS_.*_V\d+_REPORT\.md$/i.test(entry.name) ? releases : reports;
            const from = path.join(root, entry.name); const to = path.join(target, entry.name);
            if (fs.existsSync(to)) fs.rmSync(from); else fs.renameSync(from, to);
            moved++;
          }
          console.log(`PASS · fallback root cleanup v44 moved/merged ${moved} historical root artifacts`);
          NODE
          fi
          if [ ! -f tools/apply-public-trust-metadata-v44.mjs ]; then
            if [ -f tools/apply-public-trust-metadata-v43.mjs ]; then
              cp tools/apply-public-trust-metadata-v43.mjs tools/apply-public-trust-metadata-v44.mjs
            else
              cat > tools/apply-public-trust-metadata-v44.mjs <<'NODE'
          import fs from 'node:fs'; import path from 'node:path';
          const prod = 'https://montrealai.github.io/goalos-agijobmanager-ascension/';
          const site = 'site';
          if (!fs.existsSync(site)) { console.error('FAIL · missing site directory'); process.exit(1); }
          for (const f of fs.readdirSync(site).filter((x) => x.endsWith('.html'))) {
            const p = path.join(site, f); let html = fs.readFileSync(p, 'utf8');
            html = html.replace(/<link\s+rel=["']canonical["'][^>]*>/ig,'').replace(/<meta\s+property=["']og:[^"']+["'][^>]*>/ig,'').replace(/<meta\s+name=["']twitter:[^"']+["'][^>]*>/ig,'');
            const title = (html.match(/<title>([^<]+)<\/title>/i)?.[1] || 'GoalOS AGIJobManager Ascension').replace(/"/g,'&quot;');
            const desc = 'GoalOS AGIJobManager Ascension public-safe proof institution.';
            const block = `<link rel="canonical" href="${prod}${f}"><meta property="og:type" content="website"><meta property="og:title" content="${title}"><meta property="og:description" content="${desc}"><meta property="og:url" content="${prod}${f}"><meta property="og:image" content="${prod}assets/social-card.svg"><meta name="twitter:card" content="summary_large_image"><meta name="twitter:title" content="${title}"><meta name="twitter:description" content="${desc}"><meta name="twitter:image" content="${prod}assets/social-card.svg">`;
            fs.writeFileSync(p, html.includes('</head>') ? html.replace('</head>', block + '</head>') : block + html);
          }
          console.log('PASS · fallback public trust metadata v44 applied');
          NODE
            fi
          fi
          if [ ! -f tools/public-trust-checker-v44.mjs ]; then
            if [ -f tools/public-trust-checker-v43.mjs ]; then
              cp tools/public-trust-checker-v43.mjs tools/public-trust-checker-v44.mjs
            else
              cat > tools/public-trust-checker-v44.mjs <<'NODE'
          import fs from 'node:fs'; import path from 'node:path';
          const dirs = ['site']; if (process.env.CHECK_DIST === 'true' && fs.existsSync('dist')) dirs.push('dist');
          let fail = [];
          for (const d of dirs) for (const f of fs.readdirSync(d).filter((x) => x.endsWith('.html'))) {
            const html = fs.readFileSync(path.join(d, f), 'utf8');
            for (const re of [/Loading…/i, />\s*Loading\s*</i, />\s*0 routes\s*</i, /navigation-v38|site-shell|site-guide/i]) if (re.test(html)) fail.push(`${d}/${f}: ${re}`);
            for (const re of [/<link rel="canonical"/i, /property="og:title"/i, /name="twitter:card"/i]) if (!re.test(html)) fail.push(`${d}/${f}: missing metadata ${re}`);
          }
          if (fail.length) { console.error('FAIL · fallback public trust v44 checks failed'); fail.slice(0, 60).forEach((f) => console.error(' - '+f)); process.exit(1); }
          console.log('PASS · fallback public trust v44 checks passed');
          NODE
            fi
          fi
          if [ ! -f tools/repository-public-trust-failsafe-v44-kernel.mjs ]; then
            cat > tools/repository-public-trust-failsafe-v44-kernel.mjs <<'NODE'
          import fs from 'node:fs';
          const workflow = fs.readFileSync('.github/workflows/goalos-agijobmanager-ascension-production-url-autopilot.yml', 'utf8');
          const required = ['Bootstrap resilient public-trust tooling', 'root-cleanup-v44.mjs', 'apply-public-trust-metadata-v44.mjs', 'public-trust-checker-v44.mjs'];
          const missing = required.filter((x) => !workflow.includes(x));
          if (missing.length) { console.error('FAIL · v44 workflow missing failsafe markers: ' + missing.join(', ')); process.exit(1); }
          console.log('PASS · Repository Public Trust Failsafe v44 kernel');
          NODE
          fi

      - name: Neutralize registry lock-in, clean root, rehydrate routes, and apply public-trust metadata
        shell: bash
        run: |
          set -euo pipefail
          rm -f package-lock.json npm-shrinkwrap.json yarn.lock pnpm-lock.yaml
          test -f site/vendor/ethers.umd.min.js
          node tools/site-rehydrate.mjs
          node tools/root-cleanup-v44.mjs
          node tools/apply-public-trust-metadata-v44.mjs

      - name: Verify implementation, boundaries, workflow references, docs, metadata, and all demos
        shell: bash
        env:
          ETHEREUM_RPC_URL: ${{ secrets.ETHEREUM_RPC_URL }}
          RUN_LIVE_FACTUAL_CHECK: ${{ inputs.run_live_factual_check || 'false' }}
          STRICT_LIVE_FACTUAL_CHECK: ${{ inputs.strict_live_factual_check || 'false' }}
        run: |
          set -euo pipefail
          node --version
          python3 tools/verify.py
          node tools/no-registry-preflight.mjs
          node tools/pathspec-proof-kernel.mjs
          node tools/workflow-reference-auditor.mjs
          node tools/docs-link-checker.mjs
          node tools/claim-boundary-checker.mjs
          node tools/run-documentation-tests.mjs
          node tools/public-trust-checker-v44.mjs
          node tools/run-all-tests.mjs
          if [ "${RUN_LIVE_FACTUAL_CHECK}" = "true" ]; then
            if [ -n "${ETHEREUM_RPC_URL:-}" ]; then
              node tools/mainnet-factual-check.mjs
            elif [ "${STRICT_LIVE_FACTUAL_CHECK}" = "true" ]; then
              echo "ETHEREUM_RPC_URL is required for strict live factual check" >&2
              exit 1
            else
              echo '{"status":"SKIPPED","reason":"ETHEREUM_RPC_URL not configured"}' > FACTUAL_CORRECTNESS_REPORT.json
            fi
          else
            echo '{"status":"SKIPPED","reason":"Live factual check disabled for deterministic Pages deployment"}' > FACTUAL_CORRECTNESS_REPORT.json
          fi

      - name: Build static Pages artifact and verify public trust release
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/build.py
          node tools/run-existing-kernels.mjs
          node tools/institutional-website-finalization-v42-kernel.mjs
          CHECK_DIST=true node tools/public-trust-checker-v44.mjs
          node tools/repository-public-trust-failsafe-v44-kernel.mjs
          test -f dist/index.html
          test -f dist/start.html
          test -f dist/coordination-lab.html
          test -f dist/experience-concierge.html
          test -f dist/command-center.html
          test -f dist/experience-hub.html
          test -f dist/site-atlas.html
          test -f dist/navigation-atlas.html
          test -f dist/proof-settlement-lifecycle.html
          test -f dist/production-url.json

      - name: Commit generated source with retry
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.commit_generated_source != false }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "Generate GoalOS Repository Public Trust Failsafe v44"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            git fetch origin main
            git rebase origin/main || true
            sleep $((attempt * 2))
          done
          git push origin HEAD:main

      - name: Configure GitHub Pages
        if: ${{ inputs.deploy_pages != false }}
        uses: actions/configure-pages@v6.0.0

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages != false }}
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: dist

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages != false }}
        id: deployment
        uses: actions/deploy-pages@v5.0.0

      - name: Verify deployed URL contract
        if: ${{ inputs.deploy_pages != false }}
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ steps.deployment.outputs.page_url }}"
          case "${{ steps.deployment.outputs.page_url }}" in
            https://montrealai.github.io/goalos-agijobmanager-ascension/*|https://montrealai.github.io/goalos-agijobmanager-ascension/) exit 0 ;;
            *) echo "Unexpected Pages URL" >&2; exit 1 ;;
          esac
