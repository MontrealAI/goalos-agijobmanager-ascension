      - name: Write site/assets/atelier.js
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site/assets
          cat > site/assets/atelier.js <<'JS'
          const $=(s,r=document)=>r.querySelector(s);const $$=(s,r=document)=>[...r.querySelectorAll(s)];
          const CANON={manager:'0xB3AAeb69b630f0299791679c063d68d6687481d1',token:'0xa61a3b3a130a9c20768eebf97e21515a6046a1fa',chain:'Ethereum Mainnet',chainId:1,url:'https://montrealai.github.io/goalos-agijobmanager-ascension/'};
          const steps=['REQUEST','ESCROW','EXECUTE','PROVE','VALIDATE','DISPUTE','SETTLE','FINALIZE','CHRONICLE','REVIEW'];
          function h32(str){let h=2166136261>>>0;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619)}return (h>>>0).toString(16).padStart(8,'0')}
          function docketFromForm(){let preset=$('#preset')?.value||'Proof-settled market brief',objective=$('#objective')?.value||'',risk=$('#risk')?.value||'Consequential',review=$('#review')?.value||'Human review';let seed=h32([preset,objective,risk,review,CANON.manager].join('|'));return{docket:'AGIJOBMANAGER-ASCENSION-'+seed.toUpperCase(),generatedAt:new Date().toISOString(),productionUrl:CANON.url,canonical:{agiJobManager:CANON.manager,agialpha:CANON.token,chain:CANON.chain,chainId:CANON.chainId},mission:{preset,objective,risk,review,authority:'NONE_GRANTED',externalActions:0,transactionBroadcast:false,walletConnection:false},lifecycle:steps.map((name,i)=>({index:i+1,state:name,proofRoot:'0x'+h32(seed+name+i)+h32(name+seed),status:i<9?'sealed':'human_review_required'})),selection:{decision:'HUMAN_REVIEW_REQUIRED',factualCorrectness:'NOT_CERTIFIED',production:'NOT_ACTIVATED',funds:'NO_AUTHORIZATION'},boundaries:['No wallet auto-connect','No token approval','No network switch','No transaction broadcast','No production activation','No external audit claim']}}
          function download(name,obj){const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)}
          function copyText(text){navigator.clipboard?.writeText(text).catch(()=>{});}
          function drawConstellation(step=0){const svg=$('#constellation');if(!svg)return;const W=760,H=420,cx=380,cy=210;let nodes=['REQ','ESC','EXE','PRF','VAL','DSP','SET','FIN','CHR','REV'];let html=`<defs><radialGradient id="g" cx="35%" cy="25%"><stop offset="0" stop-color="#fff"/><stop offset=".25" stop-color="#ffe887"/><stop offset=".62" stop-color="#70ffd1"/><stop offset="1" stop-color="#a889ff"/></radialGradient><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`;html+=`<rect width="100%" height="100%" fill="transparent"/>`;for(let r of [70,120,170])html+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(112,255,209,.16)"/>`;nodes.forEach((n,i)=>{let a=-Math.PI/2+i*(Math.PI*2/nodes.length);let x=cx+Math.cos(a)*170,y=cy+Math.sin(a)*145;let active=i===step,done=i<step;html+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="${done||active?'#70ffd1':'rgba(255,255,255,.12)'}" stroke-width="${active?2.4:1}" stroke-dasharray="${done?'0':'5 6'}"/>`;html+=`<circle cx="${x}" cy="${y}" r="24" fill="${active?'#ffe887':done?'rgba(112,255,209,.22)':'#09131d'}" stroke="${active?'#fff':'#70ffd1'}" filter="${active?'url(#glow)':''}"/>`;html+=`<text x="${x}" y="${y+4}" text-anchor="middle" font-size="11" font-weight="900" fill="${active?'#061014':'#f8f4e8'}">${n}</text>`});html+=`<circle cx="${cx}" cy="${cy}" r="58" fill="url(#g)" filter="url(#glow)"/><text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="22" font-weight="1000" fill="#061014">αJ</text><text x="${cx}" y="${cy+17}" text-anchor="middle" font-size="9" font-weight="900" fill="#061014">SETTLEMENT</text>`;svg.innerHTML=html}
          function renderConsole(){let i=0;const states=$$('#states .state'),trace=$('#trace'),docketView=$('#docketView'),ring=$('#score');function log(msg){if(!trace)return;let div=document.createElement('div');div.textContent='› '+msg;trace.appendChild(div);trace.scrollTop=trace.scrollHeight}function paint(){states.forEach((el,n)=>{el.classList.toggle('done',n<i);el.classList.toggle('active',n===i);});drawConstellation(Math.min(i,steps.length-1));if(ring)ring.textContent=String(72+Math.min(15,i*2));if(docketView)docketView.textContent=JSON.stringify(docketFromForm(),null,2)}$('#runCycle')?.addEventListener('click',()=>{trace.innerHTML='';i=0;paint();log('GoalOSCommit sealed. Canonical contract identity checked.');let timer=setInterval(()=>{log(`${steps[i]} gate completed · proof root 0x${h32(steps[i]+Date.now())}${h32(String(i))}`);i++;paint();if(i>=steps.length){clearInterval(timer);log('Terminal disposition: HUMAN_REVIEW_REQUIRED. External actions remain zero.');}},360)});$('#stepCycle')?.addEventListener('click',()=>{if(i<steps.length){log(`${steps[i]} gate manually advanced.`);i++;paint()}});$('#resetCycle')?.addEventListener('click',()=>{i=0;trace.innerHTML='';paint();log('Console reset. No external state touched.')});$('#downloadDocket')?.addEventListener('click',()=>download('agijobmanager-evidence-docket.json',docketFromForm()));$('#copySummary')?.addEventListener('click',()=>copyText(JSON.stringify(docketFromForm(),null,2)));paint();log('Read-only chamber armed. No wallet, no approval, no transaction.')} 
          function counters(){document.querySelectorAll('[data-count]').forEach(el=>{let target=Number(el.dataset.count),n=0,step=Math.max(1,Math.ceil(target/50));let t=setInterval(()=>{n=Math.min(target,n+step);el.textContent=n;if(n>=target)clearInterval(t)},22)})}
          function particles(){const c=$('#stars');if(!c)return;let ctx=c.getContext('2d'),dots=[];function size(){c.width=innerWidth*devicePixelRatio;c.height=innerHeight*devicePixelRatio;dots=Array.from({length:90},()=>({x:Math.random()*c.width,y:Math.random()*c.height,v:.2+Math.random()*0.8,r:1+Math.random()*2}))}function tick(){ctx.clearRect(0,0,c.width,c.height);dots.forEach(d=>{d.y+=d.v;if(d.y>c.height)d.y=0;ctx.globalAlpha=.25+d.v*.35;ctx.fillStyle=d.v>.6?'#70ffd1':'#ffe887';ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,7);ctx.fill()});requestAnimationFrame(tick)}size();addEventListener('resize',size);tick()}
          addEventListener('DOMContentLoaded',()=>{particles();counters();renderConsole();$('#year')&&( $('#year').textContent=new Date().getFullYear());});
          
          JS

      - name: Write site/index.html
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site
          cat > site/index.html <<'HTML_INDEX'
          <!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GoalOS AGIJobManager Ascension</title><meta name="description" content="GoalOS-native public evidence room and read-only settlement console for AGIJobManager Ascension."><link rel="stylesheet" href="assets/atelier.css"></head><body class="grain"><a class="skip" href="#main">Skip to content</a><canvas id="stars" style="position:fixed;inset:0;z-index:0;pointer-events:none"></canvas><div class="aurora"></div><header class="topbar"><div class="topline">GoalOS AGIJobManager Ascension · proof-settlement institution · public-safe</div><div class="wrap nav"><a class="brand" href="./"><span class="brand-mark"></span><span>GoalOS AGIJobManager<small>Ascension Chamber</small></span></a><nav class="navlinks" aria-label="Primary"><a href="operator-console.html">Console</a><a href="evidence/">Evidence</a><a href="architecture.html">Architecture</a><a href="verification.html">Verification</a><a href="https://montrealai.github.io/agijobmanagerv0.html">Expert Console</a></nav><select class="mobile-nav" onchange="location.href=this.value"><option value="./">Home</option><option value="operator-console.html">Console</option><option value="evidence/">Evidence</option><option value="architecture.html">Architecture</option><option value="verification.html">Verification</option></select></div></header><main id="main"><section class="hero"><div class="wrap hero-grid"><div><div class="kicker">Settlement chamber · Ethereum Mainnet identity</div><h1>Proof-settled<br><span class="grad">machine work</span><br><span class="serif">under human authority.</span></h1><p class="lead">A public evidence institution for AGIJobManager: contract identity, proof lifecycle, readable architecture, Evidence Docket, and a read-only operator chamber that never connects a wallet or broadcasts a transaction.</p><div class="cta"><a class="btn" href="operator-console.html">O