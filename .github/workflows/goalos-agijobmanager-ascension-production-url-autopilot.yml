name: GoalOS AGIJobManager Ascension Sovereign Experience Stream Publisher v24

on:
  workflow_dispatch:
    inputs:
      deploy_pages:
        description: Deploy the generated static site to GitHub Pages
        required: true
        default: true
        type: boolean
      commit_generated_source:
        description: Commit generated source and build artifacts back to main
        required: true
        default: true
        type: boolean
      run_live_factual_check:
        description: Run optional live Ethereum factual check if ETHEREUM_RPC_URL is available
        required: true
        default: false
        type: boolean
      strict_live_factual_check:
        description: Fail if optional live Ethereum factual check cannot run
        required: true
        default: false
        type: boolean
  push:
    branches: [ main ]
    paths:
      - 'site/**'
      - 'data/**'
      - 'docs/**'
      - 'schemas/**'
      - 'src/**'
      - 'tools/**'
      - 'tests/**'
      - 'package.json'
      - '.github/workflows/goalos-agijobmanager-ascension-production-url-autopilot.yml'

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: goalos-agijobmanager-ascension-publisher
  cancel-in-progress: false

jobs:
  build-assure-publish:
    name: Build, assure, and publish Sovereign Experience Stream
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Neutralize registry lock-in and keep dependency-zero state
        shell: bash
        run: |
          set -euo pipefail
          rm -f package-lock.json npm-shrinkwrap.json yarn.lock pnpm-lock.yaml
          test -f site/vendor/ethers.umd.min.js

      - name: Verify implementation, boundaries, demos, Replay Gauntlet, and Experience Stream
        shell: bash
        env:
          ETHEREUM_RPC_URL: ${{ secrets.ETHEREUM_RPC_URL }}
          RUN_LIVE_FACTUAL_CHECK: ${{ inputs.run_live_factual_check || 'false' }}
          STRICT_LIVE_FACTUAL_CHECK: ${{ inputs.strict_live_factual_check || 'false' }}
        run: |
          set -euo pipefail
          node --version
          python3 tools/verify.py
          node tests/operator-parity.test.mjs
          node tests/sovereign-machine-economy.test.mjs
          node tests/final-assurance-kernel.test.mjs
          node tests/legal-shield.test.mjs
          node tests/token-boundary.test.mjs
          node tests/user-delight.test.mjs
          node tests/proof-governed-institution.test.mjs
          node tests/proof-to-action-theatre.test.mjs
          node tests/proof-gradient-arena.test.mjs
          node tests/chronicle-compounding-lab.test.mjs
          node tests/ascension-inflow-control.test.mjs
          node tests/claim-boundary-firewall.test.mjs
          node tests/replay-falsification-gauntlet.test.mjs
          node tools/no-registry-preflight.mjs
          node tools/pathspec-proof-kernel.mjs
          node tools/automated-assurance.mjs
          node tools/final-assurance-kernel.mjs
          node tools/legal-shield-kernel.mjs
          node tools/token-boundary-kernel.mjs
          node tools/user-delight-kernel.mjs
          node tools/proof-governed-institution-kernel.mjs
          node tools/proof-to-action-theatre-kernel.mjs
          node tools/proof-gradient-arena-kernel.mjs
          node tools/chronicle-compounding-lab-kernel.mjs
          node tools/ascension-inflow-control-kernel.mjs
          node tools/claim-boundary-firewall-kernel.mjs
          node tools/replay-falsification-gauntlet-kernel.mjs
          node tests/sovereign-experience-stream.test.mjs
          node tools/sovereign-experience-stream-kernel.mjs
          if [ "${RUN_LIVE_FACTUAL_CHECK}" = "true" ]; then
            if [ -n "${ETHEREUM_RPC_URL:-}" ]; then
              node tools/mainnet-factual-check.mjs
            elif [ "${STRICT_LIVE_FACTUAL_CHECK}" = "true" ]; then
              echo "ETHEREUM_RPC_URL is required for strict live factual check" >&2
              exit 1
            else
              echo '{"status":"SKIPPED","reason":"ETHEREUM_RPC_URL not configured"}' > FACTUAL_CORRECTNESS_REPORT.json
            fi
          else
            echo '{"status":"SKIPPED","reason":"Live factual check disabled for deterministic Pages deployment"}' > FACTUAL_CORRECTNESS_REPORT.json
          fi

      - name: Build static Pages artifact with Sovereign Experience Stream
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/build.py
          node tools/user-delight-kernel.mjs
          node tools/proof-governed-institution-kernel.mjs
          node tools/proof-to-action-theatre-kernel.mjs
          node tools/proof-gradient-arena-kernel.mjs
          node tools/chronicle-compounding-lab-kernel.mjs
          node tools/ascension-inflow-control-kernel.mjs
          node tools/claim-boundary-firewall-kernel.mjs
          node tools/replay-falsification-gauntlet-kernel.mjs
          node tests/sovereign-experience-stream.test.mjs
          node tools/sovereign-experience-stream-kernel.mjs
          test -f dist/start.html
          test -f dist/demo-lab.html
          test -f dist/coordination-lab.html
          test -f dist/proof-to-action-theatre.html
          test -f dist/proof-gradient-arena.html
          test -f dist/chronicle-compounding-lab.html
          test -f dist/ascension-inflow-control.html
          test -f dist/claim-boundary-firewall.html
          test -f dist/replay-falsification-gauntlet.html
          test -f dist/sovereign-experience-stream.html
          test -f dist/mission-studio.html
          test -f dist/proof-cards.html
          test -f dist/demo-missions.json
          test -f dist/proof-governed-institution-demo.json
          test -f dist/proof-to-action-theatre-demo.json
          test -f dist/proof-gradient-arena-demo.json
          test -f dist/chronicle-compounding-lab-demo.json
          test -f dist/ascension-inflow-control-demo.json
          test -f dist/claim-boundary-firewall-demo.json
          test -f dist/replay-falsification-gauntlet-demo.json
          test -f dist/sovereign-experience-stream-demo.json

      - name: Commit generated source with retry
        if: ${{ inputs.commit_generated_source != false }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "Generate GoalOS Sovereign Experience Stream v24"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            git fetch origin main
            git rebase origin/main || true
            sleep $((attempt * 2))
          done
          git push origin HEAD:main

      - name: Configure GitHub Pages
        if: ${{ inputs.deploy_pages != false }}
        uses: actions/configure-pages@v6.0.0

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages != false }}
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: dist

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages != false }}
        id: deployment
        uses: actions/deploy-pages@v5.0.0

      - name: Verify deployed URL contract
        if: ${{ inputs.deploy_pages != false }}
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ steps.deployment.outputs.page_url }}"
          case "${{ steps.deployment.outputs.page_url }}" in
            https://montrealai.github.io/goalos-agijobmanager-ascension/*|https://montrealai.github.io/goalos-agijobmanager-ascension/) exit 0 ;;
            *) echo "Unexpected Pages URL" >&2; exit 1 ;;
          esac
