name: GoalOS AGIJobManager Ascension Take-Care Console v65 Publisher / GoalOS Command Console v64 Publisher / Mission Autopilot v63 Publisher / Compatibility Failsafe v46
# GoalOS Command Console v64. Mission Autopilot v63. Ask GoalOS Sovereign Router v62. Ask GoalOS Route Count Self-Healing v61. Ask GoalOS Autonomous Question Router v60. Canonical Proof Institution Finalization v59. Historical compatibility labels intentionally preserved for public-trust tests: Complete Experience Restoration v58; Complete Route Recovery v57; Superintelligence Proof Governance Publisher v54; Compatibility Failsafe Publisher v46; Day-Scale Loop Observatory Failsafe Publisher v48; Loop Evidence Reactor Publisher v49; Loop to RSI Sovereign Governance Publisher v50; Loop to RSI Control Room Publisher v51; Loop to RSI to ASI Superintelligence Publisher v52; ASI Proof Horizon Console Publisher v53.

on:
  workflow_dispatch:
    inputs:
      deploy_pages:
        description: "Deploy the verified static site to GitHub Pages. Recommended: true."
        required: true
        default: true
        type: boolean
      commit_generated_source:
        description: "Commit generated source/build artifacts back to main after checks. Recommended: true."
        required: true
        default: true
        type: boolean
      run_live_factual_check:
        description: "Optionally run live Ethereum factual checks when ETHEREUM_RPC_URL is configured. Default: false for deterministic publishing."
        required: true
        default: false
        type: boolean
      strict_live_factual_check:
        description: "Fail if the optional live factual check cannot run. Default: false."
        required: true
        default: false
        type: boolean
  push:
    branches: [ main ]
    paths:
      - 'site/**'
      - 'data/**'
      - 'docs/**'
      - 'schemas/**'
      - 'tools/**'
      - 'tests/**'
      - 'package.json'
      - 'README.md'
      - 'LICENSE'
      - 'NOTICE'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'SUPPORT.md'
      - 'CODE_OF_CONDUCT.md'
      - '.github/**'

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: goalos-agijobmanager-ascension-publisher
  cancel-in-progress: false

jobs:
  # Release compatibility harmonizers: tools/release-compatibility-harmonizer.mjs tools/release-compatibility-harmonizer-v59.mjs tools/release-compatibility-harmonizer-v58.mjs tools/release-compatibility-harmonizer-v57.mjs tools/release-compatibility-harmonizer-v54.mjs tools/release-compatibility-harmonizer-v53.mjs tools/release-compatibility-harmonizer-v52.mjs tools/release-compatibility-harmonizer-v50.mjs
  # Public-trust bootstrap compatibility path: tools/failsafe-bootstrap-v59.mjs tools/failsafe-bootstrap-v58.mjs tools/failsafe-bootstrap-v54.mjs tools/failsafe-bootstrap-v53.mjs tools/failsafe-bootstrap-v52.mjs tools/failsafe-bootstrap-v51.mjs tools/failsafe-bootstrap-v49.mjs tools/failsafe-bootstrap-v48.mjs tools/root-cleanup-v48.mjs
  # Dynamic guarded runners: tools/run-documentation-tests.mjs tools/run-all-tests.mjs tools/run-existing-kernels.mjs tools/workflow-reference-auditor.mjs tools/build.py
  build-assure-publish:
    name: Build, assure, and publish v65 Take-Care Console public proof institution
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Bootstrap compatibility failsafe tooling
        shell: bash
        run: |
          set -euo pipefail
          rm -f package-lock.json npm-shrinkwrap.json yarn.lock pnpm-lock.yaml
          test -f site/vendor/ethers.umd.min.js
          mkdir -p tools tests docs/releases docs/reports/historical-root data site site/assets schemas
          for file in tools/failsafe-bootstrap-v65.mjs tools/goalos-take-care-v65-kernel.mjs tools/public-trust-checker-v65.mjs tools/release-compatibility-harmonizer-v65.mjs tests/goalos-take-care-v65.test.mjs tools/route-count-harmonizer-v65.mjs tools/route-recovery-v65.mjs tools/failsafe-bootstrap-v64.mjs tools/goalos-command-console-v64-kernel.mjs tools/public-trust-checker-v64.mjs tools/release-compatibility-harmonizer-v64.mjs tests/goalos-command-console-v64.test.mjs tools/route-count-harmonizer-v64.mjs tools/route-recovery-v64.mjs tools/failsafe-bootstrap-v63.mjs tools/mission-autopilot-v63-kernel.mjs tools/public-trust-checker-v63.mjs tools/release-compatibility-harmonizer-v63.mjs tests/mission-autopilot-v63.test.mjs tools/route-count-harmonizer-v63.mjs tools/failsafe-bootstrap-v62.mjs tools/ask-goalos-sovereign-router-v62-kernel.mjs tools/public-trust-checker-v62.mjs tools/release-compatibility-harmonizer-v62.mjs tests/ask-goalos-sovereign-router-v62.test.mjs tools/failsafe-bootstrap-v61.mjs tools/route-count-harmonizer-v61.mjs tools/route-recovery-v61.mjs tools/release-compatibility-harmonizer-v61.mjs tools/public-trust-checker-v61.mjs tools/failsafe-bootstrap-v60.mjs tools/failsafe-bootstrap-v59.mjs tools/run-documentation-tests.mjs tools/run-all-tests.mjs tools/run-existing-kernels.mjs tools/workflow-reference-auditor.mjs tools/build.py tools/route-recovery-v60.mjs tools/release-compatibility-harmonizer-v60.mjs tools/route-recovery-v59.mjs tools/release-compatibility-harmonizer-v59.mjs tools/route-recovery-v58.mjs tools/release-compatibility-harmonizer-v58.mjs tools/route-recovery-v57.mjs tools/release-compatibility-harmonizer-v57.mjs; do
            if [ ! -f "$file" ]; then
              echo "Missing required helper: $file. Upload the complete v63 overlay contents, not the ZIP file itself." >&2
              exit 1
            fi
          done
          npm run bootstrap
          node tools/route-count-harmonizer-v65.mjs
          node tools/release-compatibility-harmonizer-v65.mjs

      - name: Verify implementation, docs, metadata, routes, accessibility, public-safe boundary, and dynamic tests
        shell: bash
        env:
          ETHEREUM_RPC_URL: ${{ secrets.ETHEREUM_RPC_URL }}
          RUN_LIVE_FACTUAL_CHECK: ${{ inputs.run_live_factual_check || 'false' }}
          STRICT_LIVE_FACTUAL_CHECK: ${{ inputs.strict_live_factual_check || 'false' }}
        run: |
          set -euo pipefail
          node --version
          npm run route-count:failsafe
          npm test
          if [ "${RUN_LIVE_FACTUAL_CHECK}" = "true" ]; then
            if [ -n "${ETHEREUM_RPC_URL:-}" ]; then
              node tools/mainnet-factual-check.mjs
            elif [ "${STRICT_LIVE_FACTUAL_CHECK}" = "true" ]; then
              echo "ETHEREUM_RPC_URL is required for strict live factual check." >&2
              exit 1
            else
              echo '{"status":"SKIPPED","reason":"ETHEREUM_RPC_URL not configured"}' > FACTUAL_CORRECTNESS_REPORT.json
            fi
          else
            echo '{"status":"SKIPPED","reason":"Live factual check disabled for deterministic Pages deployment"}' > FACTUAL_CORRECTNESS_REPORT.json
          fi

      - name: Build static Pages artifact and verify canonical institution
        shell: bash
        run: |
          set -euo pipefail
          npm run build
          node tools/route-count-harmonizer-v65.mjs
          node tools/route-manifest-integrity.mjs
          node tools/canonical-proof-institution-v59-kernel.mjs
          node tools/ask-goalos-concierge-v60-kernel.mjs
          node tools/ask-goalos-sovereign-router-v62-kernel.mjs
          node tools/mission-autopilot-v63-kernel.mjs
          node tools/goalos-command-console-v64-kernel.mjs
          node tools/goalos-take-care-v65-kernel.mjs
          node tools/public-trust-checker-v65.mjs
          test -f dist/index.html
          test -f dist/canonical-proof-institution.html
          test -f dist/ask-goalos.html
          test -f dist/goalos-mission-autopilot.html
          test -f dist/goalos-command-console.html
          test -f dist/goalos-take-care.html
          test -f dist/command-center.html
          test -f dist/production-url.json

      - name: Commit generated source with safe rebase retry
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.commit_generated_source != false }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "Generate GoalOS Take-Care Console v65 artifacts"
          for attempt in 1 2 3; do
            git fetch origin main
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            sleep $((attempt * 2))
          done
          echo "Unable to push generated artifacts after safe rebase retries. Pull latest main and rerun the workflow." >&2
          exit 1

      - name: Configure GitHub Pages
        if: ${{ inputs.deploy_pages != false }}
        uses: actions/configure-pages@v6.0.0

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages != false }}
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: dist

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages != false }}
        id: deployment
        uses: actions/deploy-pages@v5.0.0

      - name: Verify deployed URL contract
        if: ${{ inputs.deploy_pages != false }}
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ steps.deployment.outputs.page_url }}"
          case "${{ steps.deployment.outputs.page_url }}" in
            https://montrealai.github.io/goalos-agijobmanager-ascension/*|https://montrealai.github.io/goalos-agijobmanager-ascension/) exit 0 ;;
            *) echo "Unexpected Pages URL" >&2; exit 1 ;;
          esac
