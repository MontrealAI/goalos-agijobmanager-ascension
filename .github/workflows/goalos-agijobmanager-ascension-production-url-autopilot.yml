name: GoalOS AGIJobManager Ascension Stable Public Trust Compatibility Failsafe Publisher v46

on:
  workflow_dispatch:
    inputs:
      deploy_pages:
        description: Deploy the generated static site to GitHub Pages
        required: true
        default: true
        type: boolean
      commit_generated_source:
        description: Commit generated source and build artifacts back to main after checks pass
        required: true
        default: true
        type: boolean
      run_live_factual_check:
        description: Run optional live Ethereum factual check if ETHEREUM_RPC_URL is configured
        required: true
        default: false
        type: boolean
      strict_live_factual_check:
        description: Fail if optional live Ethereum factual check cannot run
        required: true
        default: false
        type: boolean
  push:
    branches: [ main ]
    paths:
      - 'site/**'
      - 'data/**'
      - 'docs/**'
      - 'schemas/**'
      - 'tools/**'
      - 'tests/**'
      - 'package.json'
      - 'README.md'
      - 'LICENSE'
      - 'NOTICE'
      - 'NOTICE.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'SUPPORT.md'
      - 'CODE_OF_CONDUCT.md'
      - '.github/**'

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: goalos-agijobmanager-ascension-publisher
  cancel-in-progress: false

jobs:
  build-assure-publish:
    name: Stable source audit, build, and Pages publication
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Bootstrap compatibility failsafe tooling and reference integrity
        shell: bash
        run: |
          set -euo pipefail
          rm -f package-lock.json npm-shrinkwrap.json yarn.lock pnpm-lock.yaml
          test -f site/vendor/ethers.umd.min.js
          node --version
          node tools/failsafe-bootstrap-v46.mjs
          node tools/site-rehydrate.mjs
          node tools/root-cleanup-v46.mjs
          node tools/apply-public-trust-metadata-v46.mjs
          node tools/no-registry-preflight.mjs
          node tools/pathspec-proof-kernel.mjs
          node tools/reference-integrity-auditor.mjs

      - name: Verify docs, claims, workflows, and demo tests
        shell: bash
        env:
          ETHEREUM_RPC_URL: ${{ secrets.ETHEREUM_RPC_URL }}
          RUN_LIVE_FACTUAL_CHECK: ${{ inputs.run_live_factual_check || 'false' }}
          STRICT_LIVE_FACTUAL_CHECK: ${{ inputs.strict_live_factual_check || 'false' }}
        run: |
          set -euo pipefail
          python3 tools/verify.py
          node tools/workflow-reference-auditor.mjs
          node tools/reference-integrity-auditor.mjs
          node tools/docs-link-checker.mjs
          node tools/claim-boundary-checker.mjs
          node tools/run-documentation-tests.mjs
          node tools/public-trust-checker-v46.mjs
          node tools/run-all-tests.mjs
          if [ "${RUN_LIVE_FACTUAL_CHECK}" = "true" ]; then
            if [ -n "${ETHEREUM_RPC_URL:-}" ]; then
              node tools/mainnet-factual-check.mjs
            elif [ "${STRICT_LIVE_FACTUAL_CHECK}" = "true" ]; then
              echo "ETHEREUM_RPC_URL is required for strict live factual check" >&2
              exit 1
            else
              echo '{"status":"SKIPPED","reason":"ETHEREUM_RPC_URL not configured"}' > FACTUAL_CORRECTNESS_REPORT.json
            fi
          else
            echo '{"status":"SKIPPED","reason":"Live factual check disabled for deterministic Pages deployment"}' > FACTUAL_CORRECTNESS_REPORT.json
          fi

      - name: Build static Pages artifact and run compatibility kernels
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/build.py
          node tools/release-compatibility-harmonizer-v46.mjs
          node tools/run-existing-kernels.mjs
          CHECK_DIST=true node tools/public-trust-checker-v46.mjs
          test -f dist/index.html
          test -f dist/start.html
          test -f dist/experience-concierge.html
          test -f dist/command-center.html
          test -f dist/production-url.json

      - name: Commit generated source with retry
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.commit_generated_source != false }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "Generate GoalOS stable public trust site"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            git fetch origin main
            git rebase origin/main || true
            sleep $((attempt * 2))
          done
          git push origin HEAD:main

      - name: Configure GitHub Pages
        if: ${{ inputs.deploy_pages != false }}
        uses: actions/configure-pages@v6.0.0

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages != false }}
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: dist

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages != false }}
        id: deployment
        uses: actions/deploy-pages@v5.0.0

      - name: Verify deployed URL contract
        if: ${{ inputs.deploy_pages != false }}
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ steps.deployment.outputs.page_url }}"
          case "${{ steps.deployment.outputs.page_url }}" in
            https://montrealai.github.io/goalos-agijobmanager-ascension/*|https://montrealai.github.io/goalos-agijobmanager-ascension/) exit 0 ;;
            *) echo "Unexpected Pages URL" >&2; exit 1 ;;
          esac
