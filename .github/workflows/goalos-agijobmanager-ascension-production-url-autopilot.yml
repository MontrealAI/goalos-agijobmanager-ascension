name: GoalOS AGIJobManager Ascension Final Production Chamber v6

on:
  workflow_dispatch:
    inputs:
      deploy_pages:
        description: "Deploy to https://montrealai.github.io/goalos-agijobmanager-ascension/"
        required: true
        default: true
        type: boolean
      commit_generated_source:
        description: "Commit generated source back to main"
        required: true
        default: true
        type: boolean
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/goalos-agijobmanager-ascension-production-url-autopilot.yml'

permissions:
  contents: write
  pages: write
  id-token: write

env:
  PRODUCTION_URL: https://montrealai.github.io/goalos-agijobmanager-ascension/
  CANONICAL_REPOSITORY: MontrealAI/goalos-agijobmanager-ascension

concurrency:
  group: goalos-agijobmanager-ascension-production
  cancel-in-progress: true

jobs:
  publish:
    name: Generate final chamber, verify, and publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Assert canonical repository and sync main
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REPOSITORY}" != "${CANONICAL_REPOSITORY}" ]]; then
            echo "This workflow is locked to ${CANONICAL_REPOSITORY}. Current repository: ${GITHUB_REPOSITORY}"
            exit 1
          fi
          git fetch origin main
          git reset --hard origin/main

      - name: Prepare generated source tree
        shell: bash
        run: |
          set -euo pipefail
          rm -rf site dist data schemas docs tools tests AGIJOBMANAGER_ASCENSION_QA.md
          mkdir -p site/assets site/evidence data schemas docs tools tests

      - name: Write site/assets/atelier.css
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p site/assets
          cat > site/assets/atelier.css <<'CSS'
          :root{--bg:#02070a;--bg2:#071018;--ink:#f8f4e8;--muted:#aab8c9;--line:rgba(221,244,255,.16);--line2:rgba(144,255,218,.22);--gold:#ffe887;--mint:#70ffd1;--cyan:#57e7ff;--violet:#a889ff;--rose:#ff7eb9;--glass:rgba(14,23,32,.68);--glass2:rgba(24,33,48,.82);--shadow:0 30px 120px rgba(0,0,0,.6);--max:1180px;--radius:30px;--mono:"SFMono-Regular",Consolas,"Liberation Mono",monospace;--sans:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;--serif:Georgia,"Times New Roman",serif}
          *{box-sizing:border-box}html{scroll-behavior:smooth;background:var(--bg)}body{margin:0;color:var(--ink);font-family:var(--sans);background:radial-gradient(circle at 78% 8%,rgba(81,231,255,.16),transparent 28%),radial-gradient(circle at 20% 35%,rgba(120,255,209,.09),transparent 24%),linear-gradient(180deg,#010407,#071018 55%,#02050a);font-size:16px;line-height:1.55;overflow-x:hidden}a{color:inherit;text-decoration:none}button,input,textarea,select{font:inherit}.grain:before{content:"";position:fixed;inset:0;pointer-events:none;z-index:1;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:88px 88px;mask-image:linear-gradient(to bottom,rgba(0,0,0,.8),transparent 85%)}.aurora{position:fixed;inset:-10%;pointer-events:none;z-index:0;background:radial-gradient(circle at 80% 18%,rgba(87,231,255,.14),transparent 26%),radial-gradient(circle at 65% 68%,rgba(168,137,255,.13),transparent 28%),radial-gradient(circle at 28% 55%,rgba(112,255,209,.11),transparent 22%);filter:blur(6px);animation:aurora 18s ease-in-out infinite alternate}@keyframes aurora{to{transform:translate3d(-2%,1%,0) scale(1.05)}}.wrap{width:min(var(--max),calc(100vw - 48px));margin:0 auto;position:relative;z-index:2}.topbar{position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line);background:rgba(2,7,10,.78);backdrop-filter:blur(22px)}.topline{height:36px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--mint);font:800 10px/1 var(--mono);letter-spacing:.28em;text-transform:uppercase}.nav{height:76px;display:flex;align-items:center;justify-content:space-between;gap:24px}.brand{display:flex;gap:12px;align-items:center;font-weight:900;letter-spacing:.02em}.brand-mark{width:38px;height:38px;border-radius:13px;position:relative;background:radial-gradient(circle,#fff 0 6%,var(--cyan) 7% 20%,transparent 21%),linear-gradient(135deg,rgba(255,232,135,.32),rgba(87,231,255,.18));box-shadow:0 0 34px rgba(112,255,209,.45);border:1px solid rgba(255,255,255,.22)}.brand-mark:after{content:"";position:absolute;inset:8px;border:1px solid var(--mint);border-radius:50%;box-shadow:0 0 0 6px rgba(112,255,209,.05)}.brand small{display:block;font:800 10px/1.2 var(--mono);color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin-top:3px}.navlinks{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.navlinks a,.pill{border:1px solid var(--line);border-radius:999px;padding:10px 14px;background:rgba(255,255,255,.035);font:900 12px/1 var(--sans);transition:.2s}.navlinks a:hover,.pill:hover{border-color:var(--mint);transform:translateY(-1px);background:rgba(112,255,209,.09)}.hero{padding:112px 0 64px;min-height:780px}.kicker{display:flex;align-items:center;gap:12px;color:var(--mint);font:900 11px/1 var(--mono);letter-spacing:.24em;text-transform:uppercase}.kicker:before{content:"";width:36px;height:1px;background:var(--mint);box-shadow:0 0 18px var(--mint)}h1{font-size:clamp(72px,10vw,156px);line-height:.82;letter-spacing:-.085em;margin:26px 0 22px;max-width:860px}.grad{background:linear-gradient(90deg,#fff 0,#fff2c0 35%,#7affd8 60%,#82a7ff 100%);-webkit-background-clip:text;background-clip:text;color:transparent}.serif{font-family:var(--serif);font-style:italic;font-weight:500;letter-spacing:-.055em}.lead{font-size:clamp(18px,2vw,24px);color:#d7e4ee;max-width:720px}.hero-grid{display:grid;grid-template-columns:1fr 520px;gap:58px;align-items:center}.cta{display:flex;gap:14px;flex-wrap:wrap;margin:30px 0}.btn{cursor:pointer;border:none;border-radius:999px;padding:16px 22px;font-weight:950;background:linear-gradient(135deg,var(--gold),var(--mint));color:#091017;box-shadow:0 10px 38px rgba(255,232,135,.22);display:inline-flex;align-items:center;gap:10px}.btn.secondary{background:rgba(255,255,255,.06);color:var(--ink);border:1px solid var(--line);box-shadow:none}.btn.flat{padding:12px 16px;background:rgba(112,255,209,.1);color:var(--mint);border:1px solid var(--line2);box-shadow:none}.seal{border:1px solid rgba(255,126,185,.35);background:rgba(255,126,185,.06);border-radius:16px;padding:14px 18px;font:800 12px/1.4 var(--mono);color:#ffd8ea;max-width:760px}.dashboard{border:1px solid var(--line);background:linear-gradient(145deg,rgba(255,255,255,.09),rgba(255,255,255,.03));border-radius:var(--radius);box-shadow:var(--shadow);padding:26px;position:relative;overflow:hidden}.dashboard:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 70% 15%,rgba(112,255,209,.25),transparent 35%),linear-gradient(90deg,rgba(87,231,255,.09),transparent 40%);pointer-events:none}.dash-head,.row-between{display:flex;justify-content:space-between;align-items:center;gap:16px}.status{color:var(--mint);font:900 11px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase}.orbital{height:310px;margin:18px 0;display:grid;place-items:center;position:relative}.core{width:138px;height:138px;border-radius:50%;display:grid;place-items:center;text-align:center;background:radial-gradient(circle at 35% 25%,#fff,rgba(255,232,135,.82) 20%,rgba(112,255,209,.92) 58%,rgba(168,137,255,.88));color:#061014;font-weight:1000;box-shadow:0 0 40px rgba(112,255,209,.45),0 0 90px rgba(168,137,255,.28)}.ring{position:absolute;border:1px solid rgba(112,255,209,.18);border-radius:50%;animation:spin 18s linear infinite}.r1{width:220px;height:220px}.r2{width:292px;height:292px;animation-duration:28s}.r3{width:360px;height:360px;animation-duration:38s;animation-direction:reverse}.node{position:absolute;width:58px;height:58px;border-radius:50%;display:grid;place-items:center;font:900 11px var(--mono);background:#09131d;border:1px solid rgba(112,255,209,.7);box-shadow:0 0 24px rgba(112,255,209,.2)}.n1{top:22px}.n2{right:34px;top:84px}.n3{right:48px;bottom:72px}.n4{bottom:16px}.n5{left:46px;bottom:72px}.n6{left:34px;top:84px}.beam{position:absolute;height:2px;background:linear-gradient(90deg,transparent,var(--mint),transparent);transform-origin:center;width:260px;opacity:.45;animation:pulse 2.8s ease-in-out infinite}.b2{transform:rotate(46deg)}.b3{transform:rotate(-42deg)}@keyframes spin{to{transform:rotate(360deg)}}@keyframes pulse{50%{opacity:1;filter:drop-shadow(0 0 8px var(--mint))}}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.metric{border:1px solid var(--line);border-radius:18px;padding:16px;background:rgba(0,0,0,.18)}.metric strong{display:block;font-size:24px;color:var(--gold)}.metric span{font:800 10px var(--mono);letter-spacing:.14em;color:var(--muted);text-transform:uppercase}.section{padding:80px 0;border-top:1px solid var(--line)}.section h2{font-size:clamp(42px,6.4vw,92px);line-height:.9;letter-spacing:-.07em;margin:0 0 18px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:22px}.card{border:1px solid var(--line);border-radius:26px;padding:24px;background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.025));box-shadow:0 18px 70px rgba(0,0,0,.22)}.card h3{margin:0 0 10px;font-size:24px;letter-spacing:-.03em}.card p{color:var(--muted)}.tag{font:900 10px var(--mono);letter-spacing:.18em;text-transform:uppercase;color:var(--mint)}.flow{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-top:26px}.flow div{border:1px solid var(--line);border-radius:16px;padding:16px 10px;text-align:center;font:900 11px var(--mono);text-transform:uppercase;letter-spacing:.08em;background:rgba(255,255,255,.035)}.console-shell{display:grid;grid-template-columns:320px 1fr 330px;gap:14px;align-items:start}.panel{border:1px solid var(--line);border-radius:24px;background:rgba(9,15,24,.82);box-shadow:0 28px 80px rgba(0,0,0,.3);overflow:hidden}.panel-head{padding:18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;align-items:center}.panel-body{padding:18px}.field{display:grid;gap:7px;margin:0 0 14px}.field label{font:900 10px var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}.field input,.field textarea,.field select{width:100%;background:#09111b;border:1px solid var(--line);border-radius:14px;color:var(--ink);padding:13px;outline:none}.field textarea{min-height:140px;resize:vertical}.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--mint);box-shadow:0 0 0 3px rgba(112,255,209,.1)}.statebar{display:grid;grid-template-columns:repeat(10,1fr);gap:8px}.state{padding:12px 8px;border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.035);font:900 9px/1.25 var(--mono);text-align:center;color:var(--muted);transition:.25s}.state.done{background:rgba(112,255,209,.13);border-color:rgba(112,255,209,.65);color:var(--mint)}.state.active{background:linear-gradient(135deg,var(--gold),var(--mint));color:#071018;transform:translateY(-2px);box-shadow:0 10px 25px rgba(112,255,209,.16)}.stage{min-height:420px;border:1px solid var(--line);border-radius:20px;margin-top:16px;position:relative;overflow:hidden;background:radial-gradient(circle at 50% 50%,rgba(112,255,209,.12),transparent 32%),#050b13}.stage svg{width:100%;height:420px;display:block}.trace{height:210px;overflow:auto;background:#03070d;border-top:1px solid var(--line);padding:14px;font:12px/1.45 var(--mono);color:#96ffd9}.trace div{margin:0 0 6px}.score-ring{width:156px;height:156px;border-radius:50%;display:grid;place-items:center;margin:14px auto;background:conic-gradient(var(--mint) 0 86%,rgba(255,255,255,.08) 86%);position:relative}.score-ring:after{content:"";position:absolute;inset:12px;border-radius:50%;background:#0b111d}.score-ring strong{position:relative;z-index:1;font-size:42px}.decision{border:1px solid rgba(255,232,135,.48);background:rgba(255,232,135,.07);border-radius:20px;padding:18px;margin-top:16px}.kv{display:grid;grid-template-columns:1fr auto;gap:8px;border-top:1px solid var(--line);padding:12px 0;color:var(--muted);font:900 11px var(--mono);text-transform:uppercase}.kv strong{color:var(--ink)}.footer{padding:50px 0;border-top:1px solid var(--line);color:var(--muted);font-size:13px}.skip{position:absolute;left:-999px}.skip:focus{left:18px;top:18px;z-index:100;background:var(--gold);color:#000;padding:12px;border-radius:10px}.mobile-nav{display:none}@media(max-width:1040px){.hero-grid,.grid2,.console-shell{grid-template-columns:1fr}.dashboard{max-width:600px}.flow{grid-template-columns:repeat(2,1fr)}.grid3{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}.nav{height:auto;padding:18px 0}.navlinks{display:none}.mobile-nav{display:block}.hero{padding-top:70px}h1{font-size:clamp(62px,18vw,128px)}}@media(max-width:620px){.wrap{width:min(100vw - 28px,var(--max))}.hero{min-height:auto}.statebar{grid-template-columns:repeat(2,1fr)}.metrics{grid-template-columns:1fr}.orbital{height:250px;transform:scale(.82)}.section{padding:56px 0}.console-shell{gap:12px}.panel-body{padding:14px}.topline{font-size:8px}.brand small{font-size:8px}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{animation:none!important;scroll-behavior:auto!important;transition:none!important}}
          
