          <!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Evidence Docket 6.1 · GoalOS AGIJobManager</title><meta name="theme-color" content="#061522"><link rel="stylesheet" href="../assets/atelier.css"></head><body><canvas id="field"></canvas><div class="topline">Evidence Docket 6.1 · public-safe proof room · private intelligence excluded</div><header><div class="nav"><a class="brand" href="../index.html"><span class="sigil"></span><span><b>GoalOS</b><span>Evidence Docket</span></span></a><nav class="links"><a href="../index.html">Ascension</a><a href="../operator-console.html">Console</a><a class="active" href="index.html">Evidence</a><a href="../architecture.html">Architecture</a><a href="../verification.html">Verification</a></nav></div></header><main><section class="hero"><div class="wrap grid2"><div><div class="eyebrow">Public proof / private intelligence boundary</div><h1 class="title">A proof page is <span class="g">not a marketing page.</span></h1><p class="lead">The docket makes the public claim auditable: canonical identities, supported claims, unsupported claims, safety posture, replay route, cost/risk boundary, and the exact authority this website refuses to claim.</p><div class="actions"><a class="btn primary" id="downloadDocket" href="#">Download public docket JSON</a><a class="btn dark" href="../verification.html">Open verification</a></div></div><div class="stage"><div class="consoleTop"><span>Evidence Docket 6.1</span><span class="pill">claim-bound</span></div><div class="rail" style="grid-template-columns:repeat(2,1fr)"><div class="gate"><b>01</b><span>Manifest</span></div><div class="gate"><b>02</b><span>Claims matrix</span></div><div class="gate"><b>03</b><span>Proof packets</span></div><div class="gate"><b>04</b><span>Evaluator posture</span></div><div class="gate"><b>05</b><span>Risk ledger</span></div><div class="gate"><b>06</b><span>Replay path</span></div></div><p class="small">Public-safe commitments only. Private prompts, raw logs, privileged workpapers, customer data, and secret material are excluded.</p></div></div></section><section class="section paper"><div class="wrap"><h2 class="sectionTitle">Claims matrix</h2><div class="grid3"><div class="tile"><h3>What is claimed</h3><ul><li>Production GitHub Pages website.</li><li>Read-only operator intent console.</li><li>Evidence Docket and verification manifest.</li><li>Canonical contract and token identity display.</li></ul></div><div class="tile"><h3>What is not claimed</h3><ul><li>No external audit completion.</li><li>No production fund authorization.</li><li>No Mainnet transaction broadcast.</li><li>No autonomous legal or institutional authority.</li></ul></div><div class="tile"><h3>What must remain human</h3><ul><li>Wallet authorization.</li><li>Token allowance approval.</li><li>Mainnet transaction signing.</li><li>Production activation and release claims.</li></ul></div></div></div></section><section class="section"><div class="wrap grid2"><div><h2 class="sectionTitle">Canonical evidence anchors</h2><p class="lead">The public room exists to reduce ambiguity. The contract address, AGIALPHA address, chain, production URL, and safety posture are exposed in multiple machine-readable files.</p></div><div class="matrix"><div class="cell"><h4>Contract</h4><p class="mono">0xB3AAeb69b630f0299791679c063d68d6687481d1</p></div><div class="cell"><h4>Token</h4><p class="mono">0xa61a3b3a130a9c20768eebf97e21515a6046a1fa</p></div><div class="cell"><h4>Production URL</h4><p class="mono">https://montrealai.github.io/goalos-agijobmanager-ascension/</p></div><div class="cell"><h4>External actions</h4><p>0 by design.</p></div></div></div></section></main><footer class="footer"><div class="wrap">Evidence Docket 6.1 · Public proof, private intelligence protected</div></footer><script src="../assets/atelier.js"></script></body></html>
