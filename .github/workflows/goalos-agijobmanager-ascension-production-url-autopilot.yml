      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Verify source
        run: npm test
      - name: Build canonical production site
        run: npm run build
      - name: Stamp production URL proof
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('fs');
          const expected = process.env.PRODUCTION_URL;
          const manifest = JSON.parse(fs.readFileSync('dist/build-manifest.json','utf8'));
          if (manifest.pagesUrl !== expected) throw new Error(`Production URL mismatch: ${manifest.pagesUrl} !== ${expected}`);
          fs.writeFileSync('dist/production-url.json', JSON.stringify({status:'PASS', repository: process.env.CANONICAL_REPOSITORY, productionUrl: expected, generatedBy:'GoalOS AGIJobManager Ascension Production URL Autopilot', generatedAt: new Date().toISOString()}, null, 2) + '\n');
          fs.writeFileSync('dist/PRODUCTION_URL.txt', expected + '\n');
          NODE
      - name: Verify built site
        run: npm run verify
      - name: Commit generated source back to main
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.commit_generated_source }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "goalos-agijobmanager-autopilot[bot]"
          git config user.email "goalos-agijobmanager-autopilot[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No source changes to commit."
          else
            git commit -m "Autonomously generate GoalOS AGIJobManager Ascension production site source [skip ci]"
            git push
          fi
      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: goalos-agijobmanager-ascension-production-site
          path: dist
      - name: Configure Pages
        if: ${{ github.event_name == 'push' || inputs.deploy_pages }}
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        if: ${{ github.event_name == 'push' || inputs.deploy_pages }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist
      - name: Deploy to GitHub Pages
        if: ${{ github.event_name == 'push' || inputs.deploy_pages }}
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Assert deployed production URL
        if: ${{ github.event_name == 'push' || inputs.deploy_pages }}
        shell: bash
        run: |
          set -euo pipefail
          test "${{ steps.deployment.outputs.page_url }}" = "$PRODUCTION_URL"
          echo "Production URL confirmed: $PRODUCTION_URL"
