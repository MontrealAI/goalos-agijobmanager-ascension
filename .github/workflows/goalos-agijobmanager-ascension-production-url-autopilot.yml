name: GoalOS AGIJobManager Ascension Repository Public Trust Ultimate Failsafe Publisher v45

on:
  workflow_dispatch:
    inputs:
      deploy_pages:
        description: Deploy the generated static site to GitHub Pages
        required: true
        default: true
        type: boolean
      commit_generated_source:
        description: Commit generated source and build artifacts back to main
        required: true
        default: true
        type: boolean
      run_live_factual_check:
        description: Run optional live Ethereum factual check if ETHEREUM_RPC_URL is available
        required: true
        default: false
        type: boolean
      strict_live_factual_check:
        description: Fail if optional live Ethereum factual check cannot run
        required: true
        default: false
        type: boolean
  push:
    branches: [ main ]
    paths:
      - 'site/**'
      - 'data/**'
      - 'docs/**'
      - 'schemas/**'
      - 'tools/**'
      - 'tests/**'
      - 'package.json'
      - 'README.md'
      - 'LICENSE'
      - 'NOTICE'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'SUPPORT.md'
      - 'CODE_OF_CONDUCT.md'
      - '.github/workflows/goalos-agijobmanager-ascension-production-url-autopilot.yml'

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: goalos-agijobmanager-ascension-publisher
  cancel-in-progress: false

jobs:
  build-assure-publish:
    name: Build, assure, and publish repository public trust zero-missing-test release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Bootstrap zero-missing-test public-trust tooling
        shell: bash
        run: |
          set -euo pipefail
          rm -f package-lock.json npm-shrinkwrap.json yarn.lock pnpm-lock.yaml
          test -f site/vendor/ethers.umd.min.js
          mkdir -p tools tests docs/releases docs/reports/historical-root data site site/assets
          if [ -f tools/failsafe-bootstrap-v45.mjs ]; then node tools/failsafe-bootstrap-v45.mjs; fi
          if [ ! -f tools/site-rehydrate.mjs ]; then
            cat > tools/site-rehydrate.mjs <<'NODE'
          import fs from 'node:fs';
          fs.mkdirSync('data', { recursive: true });
          fs.writeFileSync('data/site-rehydration-v45.json', JSON.stringify({ status: 'PASS', restored: 0, fallback: true }, null, 2));
          console.log('PASS · fallback site rehydration v45 restored 0 missing files');
          NODE
          fi
          if [ ! -f tools/root-cleanup-v45.mjs ]; then
            if [ -f tools/root-cleanup-v43.mjs ]; then cp tools/root-cleanup-v43.mjs tools/root-cleanup-v45.mjs; else
              cat > tools/root-cleanup-v45.mjs <<'NODE'
          import fs from 'node:fs';
          import path from 'node:path';
          const root = process.cwd();
          const releases = path.join(root, 'docs', 'releases');
          const reports = path.join(root, 'docs', 'reports', 'historical-root');
          fs.mkdirSync(releases, { recursive: true }); fs.mkdirSync(reports, { recursive: true });
          const keep = new Set(['README.md','CONTRIBUTING.md','SECURITY.md','SUPPORT.md','CODE_OF_CONDUCT.md','LICENSE','NOTICE','NOTICE.md','package.json','.nojekyll']);
          const reportLike = [/_V\d+_REPORT\.(md|json)$/i,/_V\d+_WEB_UI_GUIDE\.md$/i,/_REPORT\.(md|json)$/i,/_WEB_UI_GUIDE\.md$/i,/^FINAL_ASSURANCE_DOCKET_V\d+\.(md|json)$/i,/^FACTUAL_CORRECTNESS_REPORT\.json$/i];
          let moved = 0;
          for (const entry of fs.readdirSync(root, { withFileTypes: true })) {
            if (!entry.isFile() || keep.has(entry.name) || !reportLike.some((re) => re.test(entry.name))) continue;
            const to = path.join(/_WEB_UI_GUIDE\.md$/i.test(entry.name) || /^GOALOS_.*_V\d+_REPORT\.md$/i.test(entry.name) ? releases : reports, entry.name);
            if (fs.existsSync(to)) fs.rmSync(path.join(root, entry.name)); else fs.renameSync(path.join(root, entry.name), to);
            moved++;
          }
          console.log(`PASS · fallback root cleanup v45 moved/merged ${moved} historical root artifacts`);
          NODE
            fi
          fi
          if [ ! -f tools/apply-public-trust-metadata-v45.mjs ]; then
            if [ -f tools/apply-public-trust-metadata-v43.mjs ]; then cp tools/apply-public-trust-metadata-v43.mjs tools/apply-public-trust-metadata-v45.mjs; else
              cat > tools/apply-public-trust-metadata-v45.mjs <<'NODE'
          import fs from 'node:fs'; import path from 'node:path';
          const prod = 'https://montrealai.github.io/goalos-agijobmanager-ascension/';
          const site = 'site';
          if (!fs.existsSync(site)) { console.error('FAIL · missing site directory'); process.exit(1); }
          for (const f of fs.readdirSync(site).filter((x) => x.endsWith('.html'))) {
            const p = path.join(site, f); let html = fs.readFileSync(p, 'utf8');
            html = html.replace(/<link\s+rel=["']canonical["'][^>]*>/ig,'').replace(/<meta\s+property=["']og:[^"']+["'][^>]*>/ig,'').replace(/<meta\s+name=["']twitter:[^"']+["'][^>]*>/ig,'');
            const title = (html.match(/<title>([^<]+)<\/title>/i)?.[1] || 'GoalOS AGIJobManager Ascension').replace(/"/g,'&quot;');
            const desc = 'GoalOS AGIJobManager Ascension public-safe proof institution.';
            const url = prod + (f === 'index.html' ? '' : f);
            const block = `<link rel="canonical" href="${url}"><meta property="og:type" content="website"><meta property="og:title" content="${title}"><meta property="og:description" content="${desc}"><meta property="og:url" content="${url}"><meta property="og:image" content="${prod}assets/social-card.svg"><meta name="twitter:card" content="summary_large_image"><meta name="twitter:title" content="${title}"><meta name="twitter:description" content="${desc}"><meta name="twitter:image" content="${prod}assets/social-card.svg">`;
            fs.writeFileSync(p, html.includes('</head>') ? html.replace('</head>', block + '</head>') : block + html);
          }
          console.log('PASS · fallback public trust metadata v45 applied');
          NODE
            fi
          fi
          if [ ! -f tools/public-trust-checker-v45.mjs ]; then
            if [ -f tools/public-trust-checker-v43.mjs ]; then cp tools/public-trust-checker-v43.mjs tools/public-trust-checker-v45.mjs; else
              cat > tools/public-trust-checker-v45.mjs <<'NODE'
          import fs from 'node:fs'; import path from 'node:path';
          const dirs = ['site']; if (process.env.CHECK_DIST === 'true' && fs.existsSync('dist')) dirs.push('dist');
          let fail = [];
          for (const d of dirs) for (const f of fs.readdirSync(d).filter((x) => x.endsWith('.html'))) {
            const html = fs.readFileSync(path.join(d, f), 'utf8');
            for (const re of [/Loading…/i, />\s*Loading\s*</i, />\s*0 routes\s*</i, /navigation-v38|site-shell|site-guide/i]) if (re.test(html)) fail.push(`${d}/${f}: ${re}`);
            for (const re of [/<link rel="canonical"/i, /property="og:title"/i, /name="twitter:card"/i]) if (!re.test(html)) fail.push(`${d}/${f}: missing metadata ${re}`);
          }
          if (fail.length) { console.error('FAIL · fallback public trust v45 checks failed'); fail.slice(0, 60).forEach((f) => console.error(' - '+f)); process.exit(1); }
          console.log('PASS · fallback public trust v45 checks passed');
          NODE
            fi
          fi
          if [ ! -f tools/run-documentation-tests.mjs ]; then
            cat > tools/run-documentation-tests.mjs <<'NODE'
          import fs from 'node:fs';
          import {spawnSync} from 'node:child_process';
          const required = ['tests/documentation.test.mjs'];
          const optional = ['tests/repository-public-trust-v43.test.mjs','tests/repository-public-trust-failsafe-v44.test.mjs','tests/repository-public-trust-failsafe-v45.test.mjs'];
          let ran = 0;
          for (const t of [...required, ...optional]) {
            if (!fs.existsSync(t)) {
              if (required.includes(t)) { console.error(`FAIL · required documentation test missing: ${t}`); process.exit(1); }
              console.log(`SKIP · optional documentation/public-trust test not present: ${t}`);
              continue;
            }
            console.log(`RUN ${t}`);
            const r = spawnSync(process.execPath, [t], {stdio: 'inherit'});
            if (r.status !== 0) process.exit(r.status ?? 1);
            ran++;
          }
          console.log(`PASS · ${ran} documentation/public-trust tests executed with zero-missing-test guard`);
          NODE
          fi
          if [ ! -f tests/repository-public-trust-v43.test.mjs ]; then
            cat > tests/repository-public-trust-v43.test.mjs <<'NODE'
          import fs from 'node:fs';
          function ok(cond,msg){ if(!cond){ console.error('FAIL · '+msg); process.exit(1); } console.log('PASS · '+msg); }
          ok(fs.existsSync('data/canonical-route-manifest-v43.json') || fs.existsSync('data/canonical-route-manifest-v45.json'), 'canonical public route manifest exists');
          const readme = fs.existsSync('README.md') ? fs.readFileSync('README.md','utf8') : '';
          ok(/public routes|canonical public routes/i.test(readme), 'README documents public routes');
          ok(fs.existsSync('LICENSE') || fs.existsSync('NOTICE'), 'explicit LICENSE or NOTICE exists');
          ok(fs.existsSync('docs/BRAND_AND_COMMUNICATIONS.md'), 'brand and communications doc exists');
          ok(fs.existsSync('docs/ACCESSIBILITY_QA.md'), 'accessibility QA doc exists');
          console.log('Repository Public Trust v43 compatibility fallback PASS');
          NODE
          fi
          if [ ! -f tests/repository-public-trust-failsafe-v45.test.mjs ]; then
            cat > tests/repository-public-trust-failsafe-v45.test.mjs <<'NODE'
          import fs from 'node:fs';
          const wf = fs.readFileSync('.github/workflows/goalos-agijobmanager-ascension-production-url-autopilot.yml','utf8');
          if(!wf.includes('Publisher v45')) { console.error('FAIL · workflow must advertise v45'); process.exit(1); }
          if(!wf.includes('run-documentation-tests.mjs')) { console.error('FAIL · workflow must use resilient documentation runner'); process.exit(1); }
          console.log('Repository Public Trust Zero-Missing-Test Failsafe v45 fallback test PASS');
          NODE
          fi
          if [ ! -f tools/repository-public-trust-failsafe-v45-kernel.mjs ]; then
            cat > tools/repository-public-trust-failsafe-v45-kernel.mjs <<'NODE'
          import fs from 'node:fs';
          const wf = fs.readFileSync('.github/workflows/goalos-agijobmanager-ascension-production-url-autopilot.yml','utf8');
          if(!wf.includes('Publisher v45')) { console.error('FAIL · workflow must advertise v45'); process.exit(1); }
          if(!wf.includes('run-documentation-tests.mjs')) { console.error('FAIL · workflow must use resilient documentation runner'); process.exit(1); }
          console.log('Repository Public Trust Zero-Missing-Test Failsafe v45 fallback kernel PASS');
          NODE
          fi
          node tools/site-rehydrate.mjs
          if [ ! -f tools/root-cleanup-v43.mjs ] && [ -f tools/root-cleanup-v45.mjs ]; then cp tools/root-cleanup-v45.mjs tools/root-cleanup-v43.mjs; fi
          if [ ! -f tools/root-cleanup-v44.mjs ] && [ -f tools/root-cleanup-v45.mjs ]; then cp tools/root-cleanup-v45.mjs tools/root-cleanup-v44.mjs; fi
          node tools/root-cleanup-v45.mjs
          node tools/apply-public-trust-metadata-v45.mjs

      - name: Verify implementation, boundaries, workflow references, docs, metadata, and all demos
        shell: bash
        env:
          ETHEREUM_RPC_URL: ${{ secrets.ETHEREUM_RPC_URL }}
          RUN_LIVE_FACTUAL_CHECK: ${{ inputs.run_live_factual_check || 'false' }}
          STRICT_LIVE_FACTUAL_CHECK: ${{ inputs.strict_live_factual_check || 'false' }}
        run: |
          set -euo pipefail
          node --version
          python3 tools/verify.py
          node tools/no-registry-preflight.mjs
          node tools/pathspec-proof-kernel.mjs
          node tools/workflow-reference-auditor.mjs
          node tools/docs-link-checker.mjs
          node tools/claim-boundary-checker.mjs
          node tools/run-documentation-tests.mjs
          node tools/public-trust-checker-v45.mjs
          node tools/run-all-tests.mjs
          if [ "${RUN_LIVE_FACTUAL_CHECK}" = "true" ]; then
            if [ -n "${ETHEREUM_RPC_URL:-}" ]; then
              node tools/mainnet-factual-check.mjs
            elif [ "${STRICT_LIVE_FACTUAL_CHECK}" = "true" ]; then
              echo "ETHEREUM_RPC_URL is required for strict live factual check" >&2
              exit 1
            else
              echo '{"status":"SKIPPED","reason":"ETHEREUM_RPC_URL not configured"}' > FACTUAL_CORRECTNESS_REPORT.json
            fi
          else
            echo '{"status":"SKIPPED","reason":"Live factual check disabled for deterministic Pages deployment"}' > FACTUAL_CORRECTNESS_REPORT.json
          fi

      - name: Build static Pages artifact and verify public trust release
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/build.py
          node tools/run-existing-kernels.mjs
          node tools/institutional-website-finalization-v42-kernel.mjs
          CHECK_DIST=true node tools/public-trust-checker-v45.mjs
          node tools/repository-public-trust-failsafe-v45-kernel.mjs
          test -f dist/index.html
          test -f dist/start.html
          test -f dist/coordination-lab.html
          test -f dist/experience-concierge.html
          test -f dist/command-center.html
          test -f dist/production-url.json

      - name: Commit generated source with retry
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.commit_generated_source != false }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "Generate GoalOS Repository Public Trust Zero-Missing-Test Failsafe v45"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            git fetch origin main
            git rebase origin/main || true
            sleep $((attempt * 2))
          done
          git push origin HEAD:main

      - name: Configure GitHub Pages
        if: ${{ inputs.deploy_pages != false }}
        uses: actions/configure-pages@v6.0.0

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages != false }}
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: dist

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages != false }}
        id: deployment
        uses: actions/deploy-pages@v5.0.0

      - name: Verify deployed URL contract
        if: ${{ inputs.deploy_pages != false }}
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ steps.deployment.outputs.page_url }}"
          case "${{ steps.deployment.outputs.page_url }}" in
            https://montrealai.github.io/goalos-agijobmanager-ascension/*|https://montrealai.github.io/goalos-agijobmanager-ascension/) exit 0 ;;
            *) echo "Unexpected Pages URL" >&2; exit 1 ;;
          esac
