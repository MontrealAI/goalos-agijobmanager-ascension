name: GoalOS AGIJobManager Ascension Repository + Website Institutional Excellence v56 Publisher / Superintelligence Proof Governance Publisher v54 / ASI Proof Horizon Console Publisher v53 / Loop to RSI to ASI Superintelligence Publisher v52 / Compatibility Failsafe Publisher v46
# Compatibility labels intentionally preserved for historical public-trust tests: Superintelligence Proof Governance Publisher v54; Compatibility Failsafe Publisher v46; Day-Scale Loop Observatory Failsafe Publisher v48; Loop Evidence Reactor Publisher v49; Loop to RSI Sovereign Governance Publisher v50; Loop to RSI Control Room Publisher v51; Loop to RSI to ASI Superintelligence Publisher v52; ASI Proof Horizon Console Publisher v53.

on:
  workflow_dispatch:
    inputs:
      deploy_pages:
        description: "Deploy the verified static site to GitHub Pages. Recommended: true."
        required: true
        default: true
        type: boolean
      commit_generated_source:
        description: "Commit generated source/build artifacts back to main after checks. Recommended: true."
        required: true
        default: true
        type: boolean
      run_live_factual_check:
        description: "Optionally run live Ethereum factual checks when ETHEREUM_RPC_URL is configured. Default: false for deterministic publishing."
        required: true
        default: false
        type: boolean
      strict_live_factual_check:
        description: "Fail if the optional live factual check cannot run. Default: false."
        required: true
        default: false
        type: boolean
  push:
    branches: [ main ]
    paths:
      - 'site/**'
      - 'data/**'
      - 'docs/**'
      - 'schemas/**'
      - 'tools/**'
      - 'tests/**'
      - 'package.json'
      - 'README.md'
      - 'LICENSE'
      - 'NOTICE'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'SUPPORT.md'
      - 'CODE_OF_CONDUCT.md'
      - '.github/**'

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: goalos-agijobmanager-ascension-publisher
  cancel-in-progress: false

jobs:
  # Release compatibility harmonizers: tools/release-compatibility-harmonizer.mjs tools/release-compatibility-harmonizer-v54.mjs tools/release-compatibility-harmonizer-v53.mjs tools/release-compatibility-harmonizer-v52.mjs tools/release-compatibility-harmonizer-v50.mjs
  # Public-trust bootstrap compatibility path: tools/failsafe-bootstrap-v54.mjs tools/failsafe-bootstrap-v53.mjs tools/failsafe-bootstrap-v52.mjs tools/failsafe-bootstrap-v51.mjs tools/failsafe-bootstrap-v49.mjs tools/failsafe-bootstrap-v48.mjs tools/root-cleanup-v48.mjs
  # Dynamic guarded runners: tools/run-documentation-tests.mjs tools/run-all-tests.mjs tools/run-existing-kernels.mjs tools/workflow-reference-auditor.mjs tools/build.py
  # Required v56 checkers: tools/route-manifest-integrity.mjs tools/metadata-integrity-checker.mjs tools/public-safe-static-checker.mjs tools/accessibility-static-checker.mjs
  build-assure-publish:
    name: Build, assure, and publish v56 public proof institution
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Bootstrap compatibility failsafe tooling
        shell: bash
        run: |
          set -euo pipefail
          rm -f package-lock.json npm-shrinkwrap.json yarn.lock pnpm-lock.yaml
          test -f site/vendor/ethers.umd.min.js
          for file in tools/failsafe-bootstrap.mjs tools/run-documentation-tests.mjs tools/run-all-tests.mjs tools/run-existing-kernels.mjs tools/workflow-reference-auditor.mjs tools/build.py; do
            if [ ! -f "$file" ]; then
              echo "Missing required helper: $file. Upload or restore the committed v56 helper file before rerunning this workflow." >&2
              exit 1
            fi
          done
          mkdir -p tools tests docs/releases docs/reports/historical-root data site site/assets schemas
          npm run bootstrap

      - name: Verify implementation, docs, metadata, routes, accessibility, public-safe boundary, and dynamic tests
        shell: bash
        env:
          ETHEREUM_RPC_URL: ${{ secrets.ETHEREUM_RPC_URL }}
          RUN_LIVE_FACTUAL_CHECK: ${{ inputs.run_live_factual_check || 'false' }}
          STRICT_LIVE_FACTUAL_CHECK: ${{ inputs.strict_live_factual_check || 'false' }}
        run: |
          set -euo pipefail
          node --version
          npm test
          if [ "${RUN_LIVE_FACTUAL_CHECK}" = "true" ]; then
            if [ -n "${ETHEREUM_RPC_URL:-}" ]; then
              node tools/mainnet-factual-check.mjs
            elif [ "${STRICT_LIVE_FACTUAL_CHECK}" = "true" ]; then
              echo "ETHEREUM_RPC_URL is required for strict live factual check." >&2
              exit 1
            else
              echo '{"status":"SKIPPED","reason":"ETHEREUM_RPC_URL not configured"}' > FACTUAL_CORRECTNESS_REPORT.json
            fi
          else
            echo '{"status":"SKIPPED","reason":"Live factual check disabled for deterministic Pages deployment"}' > FACTUAL_CORRECTNESS_REPORT.json
          fi

      - name: Build static Pages artifact and run post-build kernels
        shell: bash
        run: |
          set -euo pipefail
          npm run build
          node tools/route-manifest-integrity.mjs
          test -f dist/index.html
          test -f dist/command-center.html
          test -f dist/production-url.json

      - name: Commit generated source with safe rebase retry
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.commit_generated_source != false }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "Generate Repository and Website Institutional Excellence v56 artifacts"
          for attempt in 1 2 3; do
            git fetch origin main
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            sleep $((attempt * 2))
          done
          echo "Unable to push generated artifacts after safe rebase retries. Pull latest main and rerun the workflow." >&2
          exit 1

      - name: Configure GitHub Pages
        if: ${{ inputs.deploy_pages != false }}
        uses: actions/configure-pages@v6.0.0

      - name: Upload GitHub Pages artifact
        if: ${{ inputs.deploy_pages != false }}
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: dist

      - name: Deploy GitHub Pages
        if: ${{ inputs.deploy_pages != false }}
        id: deployment
        uses: actions/deploy-pages@v5.0.0

      - name: Verify deployed URL contract
        if: ${{ inputs.deploy_pages != false }}
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ steps.deployment.outputs.page_url }}"
          case "${{ steps.deployment.outputs.page_url }}" in
            https://montrealai.github.io/goalos-agijobmanager-ascension/*|https://montrealai.github.io/goalos-agijobmanager-ascension/) exit 0 ;;
            *) echo "Unexpected Pages URL" >&2; exit 1 ;;
          esac
