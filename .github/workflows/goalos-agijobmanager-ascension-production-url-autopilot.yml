      - name: Generate build and verification tooling
        shell: bash
        run: |
          set -euo pipefail
          cat > tools/build.mjs <<'JS'
          import {cpSync,rmSync,mkdirSync,writeFileSync,existsSync} from 'node:fs';
          rmSync('dist',{recursive:true,force:true}); mkdirSync('dist',{recursive:true}); cpSync('site','dist',{recursive:true});
          if(!existsSync('dist/index.html')) throw new Error('dist/index.html missing');
          writeFileSync('dist/PRODUCTION_URL.txt','https://montrealai.github.io/goalos-agijobmanager-ascension/\n');
          JS
          cat > tests/verify.mjs <<'JS'
          import {readFileSync,existsSync,writeFileSync} from 'node:fs';
          const files=['site/index.html','site/operator-console.html','site/evidence/index.html','site/architecture.html','site/verification.html','site/assets/atelier.css','site/assets/atelier.js','site/production-url.json','site/build-manifest.json','data/canonical-identities.json','schemas/goalos-intent.schema.json','schemas/evidence-docket.schema.json'];
          const results=[]; const pass=(name,ok,msg='')=>{results.push({name,ok,msg}); if(!ok) throw new Error(`${name}: ${msg}`)};
          for(const f of files) pass(`exists ${f}`,existsSync(f),'missing file');
          const all=files.filter(f=>f.endsWith('.html')||f.endsWith('.json')||f.endsWith('.js')).map(f=>readFileSync(f,'utf8')).join('\n');
          const required=['0xB3AAeb69b630f0299791679c063d68d6687481d1','0xa61a3b3a130a9c20768eebf97e21515a6046a1fa','https://montrealai.github.io/goalos-agijobmanager-ascension/','No wallet auto-connect','No token approval','No transaction broadcast','Evidence Docket 6.1','read-only'];
          for(const s of required) pass(`contains ${s.slice(0,34)}`,all.includes(s),`missing ${s}`);
          const forbidden=['eth_requestAccounts','eth_sendTransaction','wallet_switchEthereumChain','personal_sign','setApprovalForAll','privateKey =','new ethers.Wallet','window.ethereum.request'];
          for(const s of forbidden) pass(`forbidden ${s}`,!all.includes(s),'unsafe primitive present');
          const manifest=JSON.parse(readFileSync('site/production-url.json','utf8'));
          pass('production URL exact',manifest.productionUrl==='https://montrealai.github.io/goalos-agijobmanager-ascension/',manifest.productionUrl);
          pass('contract exact',manifest.contract==='0xB3AAeb69b630f0299791679c063d68d6687481d1',manifest.contract);
          pass('token exact',manifest.token==='0xa61a3b3a130a9c20768eebf97e21515a6046a1fa',manifest.token);
          const md=['# AGIJobManager Ascension QA','',`Generated: ${new Date().toISOString()}`,'','Status: PASS','',...results.map(r=>`- ${r.ok?'PASS':'FAIL'}: ${r.name}`),''].join('\n');
          writeFileSync('AGIJOBMANAGER_ASCENSION_QA.md',md);
          console.log(`GoalOS AGIJobManager Ascension QA PASS (${results.length}/${results.length})`);
          JS

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify and build static site
        shell: bash
        run: |
          set -euo pipefail
          npm test
          npm run build
          test -f dist/index.html
          test -f dist/operator-console.html
          test -f dist/evidence/index.html
          test -f dist/architecture.html
          test -f dist/verification.html
          grep -q "$PRODUCTION_URL" dist/production-url.json
          grep -q "$AGIJOBMANAGER_ADDRESS" dist/index.html
          grep -q "$AGIALPHA_ADDRESS" dist/index.html
          echo "Institutional Atelier production build PASS: $PRODUCTION_URL"

      - name: Commit generated source
        if: ${{ github.event_name == 'push' || inputs.commit_generated_source }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md package.json .nojekyll AGIJOBMANAGER_ASCENSION_QA.md site data docs schemas src tools tests dist
          if git diff --cached --quiet; then
            echo "No generated source changes to commit."
          else
            git commit -m "Generate Institutional Atelier v4 site"
            git push
          fi

      - name: Configure GitHub Pages
        if: ${{ github.event_name == 'push' || inputs.deploy_pages }}
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: ${{ github.event_name == 'push' || inputs.deploy_pages }}
