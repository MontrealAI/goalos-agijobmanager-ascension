name: Bug report
about: Report a public-safe website, documentation, or workflow issue
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened? Do not include secrets, personal data, private keys, or confidential workpapers.
    validations:
      required: true
  - type: input
    id: route
    attributes:
      label: Route or file
      description: Which page, route, or file is affected?
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
