name: Bug report
description: Report a public page, demo, workflow, or documentation bug.
title: "Bug: "
labels: [bug]
body:
  - type: input
    id: route
    attributes:
      label: Page or route
      description: Example: /experience-concierge.html
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
  - type: input
    id: browser
    attributes:
      label: Browser / environment
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot (optional)
  - type: checkboxes
    id: sensitive
    attributes:
      label: Sensitive data
      description: Do not include secrets, private keys, seed phrases, RPC credentials, personal data, or confidential workpapers.
      options:
        - label: I did not include secrets or sensitive data.
          required: true
