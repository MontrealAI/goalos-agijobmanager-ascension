name: Demo feedback
description: Share feedback on a browser-local demonstration.
title: "Demo feedback: "
labels: [demo-feedback]
body:
  - type: dropdown
    id: user_type
    attributes:
      label: User type
      options: [new, advanced, operator, reviewer]
    validations:
      required: true
  - type: input
    id: route
    attributes:
      label: Demo route
      description: Example: /evidence-docket-composer.html
    validations:
      required: true
  - type: textarea
    id: confusing
    attributes:
      label: What was confusing?
  - type: textarea
    id: helped
    attributes:
      label: What helped?
  - type: textarea
    id: artifact
    attributes:
      label: Receipt or docket exported, if any
      description: Share only public-safe identifiers or summaries. Do not include secrets, private keys, seed phrases, personal data, customer data, or confidential workpapers.
  - type: checkboxes
    id: sensitive
    attributes:
      label: Sensitive data reminder
      options:
        - label: I did not include secrets or sensitive data.
          required: true
