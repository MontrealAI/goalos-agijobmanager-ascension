name: Demo feedback
description: Share public-safe feedback on a browser-local demo.
title: "Demo feedback: "
labels: [feedback]
body:
  - type: markdown
    attributes:
      value: "No sensitive data: do not include secrets, private keys, seed phrases, personal data, customer data, or confidential data."
  - type: dropdown
    id: user_type
    attributes:
      label: User type
      options: ["New user", "Operator", "Developer", "Reviewer", "Legal-risk"]
    validations: { required: true }
  - type: input
    id: route
    attributes: { label: Demo route }
    validations: { required: true }
  - type: textarea
    id: confusing
    attributes: { label: What was confusing? }
  - type: textarea
    id: helped
    attributes: { label: What helped? }
  - type: dropdown
    id: receipt
    attributes:
      label: Was a receipt or docket exported?
      options: ["No", "Yes", "Not sure"]
