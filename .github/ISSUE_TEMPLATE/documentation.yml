name: Documentation improvement
description: Suggest a clearer README, docs, or page explanation.
title: "Docs: "
labels: [documentation]
body:
  - type: input
    id: doc
    attributes: { label: Doc/page }
    validations: { required: true }
  - type: textarea
    id: unclear
    attributes: { label: Unclear section }
    validations: { required: true }
  - type: textarea
    id: suggestion
    attributes: { label: Suggested improvement }
  - type: dropdown
    id: user_type
    attributes:
      label: User type
      options: ["New user", "Operator", "Developer", "Reviewer", "Legal-risk"]
    validations: { required: true }
